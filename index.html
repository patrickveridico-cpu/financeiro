<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro - Grupo Resgate 116</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2454/2454282.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #e11d48; --success: #10b981; --whatsapp: #25d366; 
            --bg: #0b0e14; --card-bg: rgba(30, 41, 59, 0.7); --text-main: #f8fafc;
            --text-muted: #94a3b8; --border: rgba(51, 65, 85, 0.8);
        }

        /* FUNDO COM TEXTURA ESTILOSA */
        body { 
            background-color: var(--bg); 
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0),
                radial-gradient(circle at 50% 0%, rgba(225, 29, 72, 0.15) 0%, transparent 50%);
            background-size: 40px 40px, 100% 100%;
            color: var(--text-main); 
            padding: 20px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; cursor: default; }

        /* EFEITO DE CURSOR E CLIQUE */
        .clickable, button, .day-header, .tab, .action-icons span, input, .logo-img { 
            cursor: pointer !important; 
        }
        
        .clickable:active, button:active { transform: scale(0.95); transition: 0.1s; }

        .container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }

        /* HEADER */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 25px; padding: 20px 30px; 
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 20px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo-container { display: flex; align-items: center; gap: 20px; }
        .logo-img { height: 75px; filter: drop-shadow(0 0 10px rgba(225, 29, 72, 0.3)); }
        .brand-info h1 { font-size: 1.4rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .brand-info p { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; }

        /* STATS COM DESTAQUE MÁXIMO */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--card-bg); padding: 25px; border-radius: 20px; 
            border: 1px solid var(--border); backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .stat-card.highlight-hoje { 
            border: 2px solid var(--success); 
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
            background: linear-gradient(145deg, rgba(16, 185, 129, 0.1), transparent);
            transform: translateY(-5px);
        }
        .stat-card.highlight-restante { 
            border: 2px solid var(--primary); 
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.2);
            background: linear-gradient(145deg, rgba(225, 29, 72, 0.1), transparent);
            transform: translateY(-5px);
        }
        
        .stat-card h3 { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 1px; }
        .stat-card .value { font-size: 1.8rem; font-weight: 900; }

        /* GRID PRINCIPAL */
        .dashboard-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 25px; }

        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 18px; 
            border: 1px solid var(--border); margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .card-title { font-size: 0.8rem; font-weight: 800; margin-bottom: 15px; color: var(--primary); text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: rgba(15, 23, 42, 0.8); color: white; margin-bottom: 12px; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(225, 29, 72, 0.2); }

        .btn { padding: 14px; border-radius: 10px; font-weight: 700; border: none; width: 100%; font-size: 0.85rem; transition: 0.2s; color: white; }
        .btn-primary { background: var(--primary); box-shadow: 0 4px 15px rgba(225, 29, 72, 0.3); }
        .btn-whatsapp { background: var(--whatsapp); box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2); margin-top: 10px; }

        /* LISTA SANFONA ACORDEÃO */
        .day-group { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .day-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 18px 20px; background: rgba(30, 41, 59, 0.5);
            transition: 0.3s;
        }
        .day-header:hover { background: rgba(255,255,255,0.05); }
        .day-total { color: var(--success); font-weight: 800; font-size: 1.15rem; text-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }

        .day-content { display: none; padding: 10px 20px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.3); }
        .day-group.active .day-content { display: block; animation: slideDown 0.3s ease-out; }
        .day-group.active .day-header { border-left: 6px solid var(--primary); background: rgba(225, 29, 72, 0.05); }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .entry-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .action-icons span { margin-left: 12px; font-size: 1.2rem; transition: 0.2s; }
        .action-icons span:hover { transform: scale(1.2); }

        /* WHATSAPP PREVIEW */
        .msg-preview { 
            background: #0b141a; color: #e9edef; padding: 20px; border-radius: 12px; 
            font-family: 'Courier New', monospace; font-size: 0.9rem; white-space: pre-wrap; 
            border: 1px dashed var(--border); margin-bottom: 12px; line-height: 1.4;
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 12px; background: var(--border); border-radius: 10px; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); transition: 0.3s; }
        .tab.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(225, 29, 72, 0.2); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-container">
            <img src="logo-resgate.png" class="logo-img" alt="Resgate 116" onerror="this.src='https://via.placeholder.com/180x80/1e293b/e11d48?text=RESGATE+116'">
            <div class="brand-info">
                <h1>GRUPO RESGATE 116</h1>
                <p>Criado por Patrick de Almeida</p>
            </div>
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="btn clickable" style="width:auto; background:var(--border);" onclick="fetchEntries()">🔄 Sincronizar</button>
            <button class="btn clickable" style="width:auto; background:var(--primary);" onclick="exportData()">📥 Exportar Backup</button>
            <button class="btn clickable" style="width:auto; background:none; border:1px solid var(--border);" onclick="importData()">📤 Importar Backup</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card highlight-hoje"><h3>Previsto Hoje</h3><div class="value" id="stat-hoje" style="color:var(--success)">R$ 0,00</div></div>
        <div class="stat-card highlight-restante"><h3>Restante do Mês</h3><div class="value" id="stat-restante" style="color:var(--primary)">R$ 0,00</div></div>
        <div class="stat-card"><h3>Já Liquidados</h3><div class="value" id="stat-liquidados">R$ 0,00</div></div>
        <div class="stat-card"><h3>Total Programado</h3><div class="value" id="stat-total">R$ 0,00</div></div>
    </div>

    <div class="dashboard-grid">
        <div class="left-column">
            <div class="card">
                <div class="card-title"><span>➕</span> Lançar Crédito</div>
                <form id="entry-form">
                    <input type="hidden" id="edit-id">
                    <label style="font-size: 0.7rem; color:var(--text-muted); margin-bottom: 5px; display:block">Data do Crédito</label>
                    <input type="date" id="input-date" class="clickable" required>
                    <input type="text" id="input-seguradora" placeholder="Nome da Seguradora" required>
                    <input type="text" id="input-value" placeholder="Valor R$ 0,00" required>
                    <input type="text" id="input-desc" placeholder="NF ou Observação">
                    <button type="submit" id="btn-submit" class="btn btn-primary clickable">CADASTRAR NO SISTEMA</button>
                    <button type="button" id="btn-cancel" class="btn clickable" style="display:none; margin-top:10px; background:none; border:1px solid var(--border);" onclick="resetForm()">CANCELAR</button>
                </form>
            </div>
            <div class="card"><div class="card-title"><span>📊</span> Distribuição</div><div style="height:180px"><canvas id="pieChart"></canvas></div></div>
        </div>

        <div class="center-column">
            <div class="tabs">
                <div class="tab active clickable" onclick="switchTab('proximos')" id="tab-proximos">RECEBIMENTOS PROGRAMADOS</div>
                <div class="tab clickable" onclick="switchTab('historico')" id="tab-historico">HISTÓRICO</div>
            </div>
            <div id="list-container"></div>
        </div>

        <div class="right-column">
            <div class="card"><div class="card-title"><span>📈</span> Fluxo Semanal</div><div style="height:180px"><canvas id="barChart"></canvas></div></div>
            <div class="card">
                <div class="card-title"><span>📱</span> Resumo WhatsApp</div>
                <div id="msg-preview" class="msg-preview">Carregando dados...</div>
                <button class="btn btn-whatsapp clickable" onclick="sendWhatsApp()">🚀 ENVIAR PARA O GRUPO</button>
                <button class="btn clickable" style="background:var(--border); margin-top:10px" onclick="copyToClipboard()">📋 COPIAR TEXTO</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://glmyblygbvhpluwncbtm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsbXlibHlnYnZocGx1d25jYnRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDY2MTQsImV4cCI6MjA5MTEyMjYxNH0.PqdwEYVYXIvOh2pYqQwaq8eyf2ZWS6BalQzOpINrXts';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let entries = [];
    let currentTab = 'proximos';
    let pieChart, barChart;
    let openDays = {}; 

    async function fetchEntries() {
        const { data, error } = await _supabase.from('entries').select('*').order('date', { ascending: true });
        if (!error) { entries = data; render(); }
    }

    function render() {
        const hoje = new Date().toISOString().split('T')[0];
        const mesAtual = new Date().getMonth();
        let sHoje = 0, sRestante = 0, sLiq = 0, sTotal = 0;
        let segTotals = {}, dailyTotals = {};

        entries.forEach(e => {
            const d = new Date(e.date + 'T12:00:00');
            if (d.getMonth() === mesAtual) {
                sTotal += e.value;
                if (e.date >= hoje) sRestante += e.value;
                else sLiq += e.value;
            }
            if (e.date === hoje) sHoje += e.value;
            segTotals[e.seguradora] = (segTotals[e.seguradora] || 0) + e.value;
            dailyTotals[e.date] = (dailyTotals[e.date] || 0) + e.value;
        });

        document.getElementById('stat-hoje').innerText = formatCurrency(sHoje);
        document.getElementById('stat-restante').innerText = formatCurrency(sRestante);
        document.getElementById('stat-liquidados').innerText = formatCurrency(sLiq);
        document.getElementById('stat-total').innerText = formatCurrency(sTotal);

        const filtered = entries.filter(e => currentTab === 'proximos' ? e.date >= hoje : e.date < hoje);
        const groups = filtered.reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});

        const cont = document.getElementById('list-container');
        cont.innerHTML = '';
        
        Object.keys(groups).sort((a,b) => currentTab === 'proximos' ? a.localeCompare(b) : b.localeCompare(a)).forEach(date => {
            const totalDia = groups[date].reduce((s, x) => s + x.value, 0);
            const div = document.createElement('div');
            div.className = `day-group ${openDays[date] ? 'active' : ''}`;
            div.innerHTML = `
                <div class="day-header clickable" onclick="toggleDay('${date}')">
                    <span>📅 <b>${date.split('-').reverse().slice(0,2).join('/')}</b></span>
                    <span class="day-total">${formatCurrency(totalDia)}</span>
                </div>
                <div class="day-content">
                    ${groups[date].map(e => `
                        <div class="entry-row">
                            <span><b>${e.seguradora}</b> <small style="color:var(--text-muted)">${e.desc || ''}</small></span>
                            <div class="action-icons">
                                <b>${formatCurrency(e.value)}</b>
                                <span class="clickable" onclick="editEntry(${e.id})">✏️</span>
                                <span class="clickable" onclick="deleteEntry(${e.id})">🗑️</span>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            cont.appendChild(div);
        });

        updateCharts(segTotals, dailyTotals);
        updateWhatsapp(hoje);
    }

    function toggleDay(date) { openDays[date] = !openDays[date]; render(); }

    function updateWhatsapp(hoje) {
        let msg = "*Previsões de crédito para a semana:*\n\n";
        const proximos = entries.filter(e => e.date >= hoje).sort((a,b) => a.date.localeCompare(b.date));
        const groups = proximos.reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});
        const diasSemana = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];

        Object.keys(groups).slice(0,7).forEach(date => {
            const dataObj = new Date(date + 'T12:00:00');
            const dataFmt = date.split('-').reverse().slice(0,2).join('/');
            const diaNome = diasSemana[dataObj.getDay()];
            const totalDia = groups[date].reduce((s, x) => s + x.value, 0);
            msg += `${dataFmt} ${diaNome}: *${formatCurrency(totalDia)}*\n\n`;
        });
        document.getElementById('msg-preview').innerText = msg;
    }

    document.getElementById('entry-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const val = parseFloat(document.getElementById('input-value').value.replace(/\./g, '').replace(',', '.'));
        const data = {
            date: document.getElementById('input-date').value,
            seguradora: document.getElementById('input-seguradora').value.toUpperCase(),
            value: val,
            desc: document.getElementById('input-desc').value.toUpperCase()
        };
        if (id) await _supabase.from('entries').update(data).eq('id', id);
        else await _supabase.from('entries').insert([data]);
        resetForm(); fetchEntries();
    });

    function editEntry(id) {
        const e = entries.find(x => x.id == id);
        document.getElementById('edit-id').value = e.id;
        document.getElementById('input-date').value = e.date;
        document.getElementById('input-seguradora').value = e.seguradora;
        document.getElementById('input-value').value = e.value.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        document.getElementById('input-desc').value = e.desc || '';
        document.getElementById('btn-submit').innerText = "ATUALIZAR DADOS";
        document.getElementById('btn-cancel').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function deleteEntry(id) {
        if(confirm('Excluir lançamento permanentemente?')) {
            await _supabase.from('entries').delete().eq('id', id);
            fetchEntries();
        }
    }

    function resetForm() {
        document.getElementById('entry-form').reset();
        document.getElementById('edit-id').value = '';
        document.getElementById('btn-submit').innerText = "CADASTRAR NO SISTEMA";
        document.getElementById('btn-cancel').style.display = "none";
        document.getElementById('input-date').valueAsDate = new Date();
    }

    function formatCurrency(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function updateCharts(segData, dailyData) {
        if (pieChart) pieChart.destroy();
        pieChart = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: { labels: Object.keys(segData), datasets: [{ data: Object.values(segData), backgroundColor: ['#e11d48', '#10b981', '#3b82f6', '#f59e0b', '#8b5cf6'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '75%' }
        });
        if (barChart) barChart.destroy();
        const lastDays = Object.keys(dailyData).sort().slice(-7);
        barChart = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: { labels: lastDays.map(d => d.split('-').reverse().slice(0,2).join('/')), datasets: [{ label: 'R$', data: lastDays.map(d => dailyData[d]), backgroundColor: '#e11d48', borderRadius: 6 }] },
            options: { maintainAspectRatio: false, scales: { y: { display: false }, x: { ticks: { color: '#94a3b8' } } }, plugins: { legend: { display: false } } }
        });
    }

    function switchTab(t) { currentTab = t; render(); }
    function copyToClipboard() { navigator.clipboard.writeText(document.getElementById('msg-preview').innerText).then(() => alert("Resumo copiado!")); }
    function sendWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent(document.getElementById('msg-preview').innerText)}`, '_blank'); }

    function exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(entries)], { type: 'application/json' }));
        a.download = 'backup_financeiro_resgate.json'; a.click();
    }

    function importData() {
        const input = document.createElement('input'); input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = async re => {
                const data = JSON.parse(re.target.result);
                alert("Importando dados... isso pode levar alguns segundos.");
                for (const item of data) { delete item.id; await _supabase.from('entries').insert([item]); }
                fetchEntries();
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    document.getElementById('input-value').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        v = (v / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        e.target.value = v;
    });

    document.getElementById('input-date').valueAsDate = new Date();
    fetchEntries();
</script>
</body>
</html>
