<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro - Grupo Resgate 116</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #e11d48; --success: #10b981; --whatsapp: #25d366; 
            --bg: #0b0e14; --card-bg: rgba(15, 23, 42, 0.95); --text-main: #f8fafc;
            --border: rgba(51, 65, 85, 1); --highlight-yellow: #facc15;
        }

        /* TEMA CLARO */
        [data-theme="light"] {
            --bg: #f1f5f9; --card-bg: #ffffff; --text-main: #0f172a;
            --border: #e2e8f0; --highlight-yellow: #eab308;
        }

        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 2px 2px, rgba(128,128,128,0.1) 1px, transparent 0);
            background-size: 30px 30px;
            color: var(--text-main); font-family: 'Inter', sans-serif; padding: 20px; 
            min-height: 100vh; margin: 0;
        }

        /* CURSOR CUSTOMIZADO */
        #cursor-dot { width: 8px; height: 8px; background: var(--primary); position: fixed; border-radius: 50%; pointer-events: none; z-index: 10000; }
        #cursor-outline { width: 40px; height: 40px; border: 2px solid var(--primary); position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999; transition: transform 0.1s ease-out; }

        button, a, .day-header, .action-icons span { cursor: pointer !important; }

        .container { max-width: 1500px; margin: 0 auto; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; padding: 25px 40px; background: var(--card-bg); 
            border-radius: 25px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .logo-box { display: flex; align-items: center; gap: 25px; }
        .logo-img { height: 80px; }
        .dev-info h1 { font-size: 1.8rem; font-weight: 900; color: var(--primary); margin: 0; }
        .dev-tag { background: var(--primary); color: white; padding: 4px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; }

        .admin-only { display: none; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 35px; }
        .stat-card { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--border); border-bottom: 4px solid var(--primary); }
        .destaque-amarelo { border: 2px solid var(--highlight-yellow) !important; }
        .stat-card h3 { font-size: 0.7rem; color: #94a3b8; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; }
        .stat-card .value { font-size: 1.8rem; font-weight: 900; }

        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr 350px; gap: 25px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(0,0,0,0.05); color: var(--text-main); border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; }
        [data-theme="dark"] input { background: #000; }

        .btn { padding: 14px; border-radius: 12px; font-weight: 800; border: none; width: 100%; transition: 0.2s; color: white; text-transform: uppercase; font-size: 0.8rem; }
        .btn-primary { background: var(--primary); }
        .btn-whatsapp { background: var(--whatsapp); margin-top: 10px; }
        .btn-copy { background: #475569; margin-top: 10px; }

        .day-group { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 15px; overflow: hidden; }
        .day-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(128,128,128,0.05); }
        .day-content { display: none; padding: 15px; border-top: 1px solid var(--border); }
        .day-group.active .day-content { display: block; }

        .entry-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .nf-label { font-size: 0.75rem; color: var(--primary); font-weight: 700; margin-top: 2px; display: block; }

        .msg-preview { background: #0f172a; color: #10b981; padding: 15px; border-radius: 12px; font-family: monospace; white-space: pre-wrap; font-size: 0.8rem; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-outline"></div>

<div class="container">
    <header>
        <div class="logo-box">
            <img src="logo-resgate.png" class="logo-img" alt="Logo" onerror="this.src='https://via.placeholder.com/150x80?text=RESGATE+116'">
            <div class="dev-info">
                <h1>RESGATE 116</h1>
                <span class="dev-tag">SISTEMA DEV: PATRICK ALMEIDA</span>
            </div>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button class="btn" style="background: var(--border); color: var(--text-main); width: 50px; padding: 10px;" onclick="toggleTheme()" title="Mudar Tema">🌓</button>
            <div class="admin-only" id="admin-header-btns" style="display: contents;">
                <button class="btn" style="background:var(--border); color: var(--text-main); width:auto; font-size:0.65rem;" onclick="exportData()">EXPORTAR</button>
                <button class="btn" style="background:var(--border); color: var(--text-main); width:auto; font-size:0.65rem;" onclick="document.getElementById('import-file').click()">IMPORTAR</button>
                <input type="file" id="import-file" style="display:none;" onchange="importData(event)">
            </div>
            <button class="btn btn-primary" style="width:auto; padding: 10px 20px;" onclick="fetchEntries()">🔄 SINCRONIZAR</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card destaque-amarelo"><h3>Previsto Hoje</h3><div class="value" id="stat-hoje" style="color: var(--success)">R$ 0,00</div></div>
        <div class="stat-card destaque-amarelo"><h3>Restante do Mês</h3><div class="value" id="stat-restante" style="color: var(--success)">R$ 0,00</div></div>
        <div class="stat-card"><h3>Já Liquidados</h3><div class="value" id="stat-liquidados">R$ 0,00</div></div>
        <div class="stat-card"><h3>Total Programado</h3><div class="value" id="stat-total" style="color: var(--primary)">R$ 0,00</div></div>
    </div>

    <div class="dashboard-grid">
        <div class="left-column">
            <div class="card admin-only" id="form-card">
                <div style="font-weight: 900; margin-bottom: 15px; font-size: 0.8rem; text-transform: uppercase;">➕ Novo Lançamento</div>
                <form id="entry-form">
                    <input type="hidden" id="edit-id">
                    <input type="date" id="input-date" required>
                    <input type="text" id="input-seguradora" placeholder="SEGURADORA" required>
                    <input type="text" id="input-value" placeholder="VALOR R$ 0,00" required>
                    <input type="text" id="input-desc" placeholder="NÚMERO DA NF / OBS">
                    <button type="submit" class="btn btn-primary">AGENDAR ENTRADA</button>
                </form>
            </div>
            <div class="card"><canvas id="pieChart" style="max-height: 250px;"></canvas></div>
        </div>

        <div class="center-column">
            <div id="list-container"></div>
        </div>

        <div class="right-column">
            <div class="card">
                <div style="font-weight: 900; margin-bottom: 15px; font-size: 0.8rem; text-transform: uppercase;">📱 Resumo WhatsApp</div>
                <div id="msg-preview" class="msg-preview">Carregando...</div>
                <button class="btn btn-copy" onclick="copyText()">📋 COPIAR TEXTO</button>
                <button class="btn btn-whatsapp" onclick="sendWhatsApp()">🚀 ENVIAR PARA O GRUPO</button>
            </div>
        </div>
    </div>
</div>

<script>
    // CURSOR
    const dot = document.getElementById('cursor-dot');
    const outline = document.getElementById('cursor-outline');
    window.addEventListener('mousemove', (e) => {
        dot.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
        outline.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
    });

    // ADMIN MODE & THEME
    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('admin') === 'true';
    if (isAdmin) {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
    }

    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    }
    document.body.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');

    // SUPABASE
    const SUPABASE_URL = 'https://glmyblygbvhpluwncbtm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsbXlibHlnYnZocGx1d25jYnRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDY2MTQsImV4cCI6MjA5MTEyMjYxNH0.PqdwEYVYXIvOh2pYqQwaq8eyf2ZWS6BalQzOpINrXts';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let entries = [];
    let openDays = {};

    async function fetchEntries() {
        const { data } = await _supabase.from('entries').select('*').order('date', { ascending: true });
        entries = data || [];
        render();
    }

    function render() {
        const hoje = new Date().toISOString().split('T')[0];
        const mesAtual = new Date().getMonth();
        let sHoje = 0, sRestante = 0, sLiq = 0, sTotal = 0;
        let segTotals = {};

        entries.forEach(e => {
            const d = new Date(e.date + 'T12:00:00');
            if (d.getMonth() === mesAtual) {
                sTotal += e.value;
                if (e.date >= hoje) sRestante += e.value; else sLiq += e.value;
            }
            if (e.date === hoje) sHoje += e.value;
            segTotals[e.seguradora] = (segTotals[e.seguradora] || 0) + e.value;
        });

        document.getElementById('stat-hoje').innerText = formatCurrency(sHoje);
        document.getElementById('stat-restante').innerText = formatCurrency(sRestante);
        document.getElementById('stat-liquidados').innerText = formatCurrency(sLiq);
        document.getElementById('stat-total').innerText = formatCurrency(sTotal);

        const filtered = entries.filter(e => e.date >= hoje);
        const groups = filtered.reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});
        const cont = document.getElementById('list-container');
        cont.innerHTML = '';
        
        Object.keys(groups).forEach(date => {
            const totalDia = groups[date].reduce((s, x) => s + x.value, 0);
            const div = document.createElement('div');
            div.className = `day-group ${openDays[date] ? 'active' : ''}`;
            div.innerHTML = `
                <div class="day-header" onclick="toggleDay('${date}')">
                    <span>📅 <b>${date.split('-').reverse().slice(0,2).join('/')}</b></span>
                    <span style="color:var(--success); font-weight:900;">${formatCurrency(totalDia)}</span>
                </div>
                <div class="day-content">
                    ${groups[date].map(e => `
                        <div class="entry-row">
                            <span>
                                <b style="text-transform: uppercase;">${e.seguradora}</b>
                                <span class="nf-label">${e.desc ? 'NF: ' + e.desc : 'S/ NF'}</span>
                            </span>
                            <div style="display:flex; align-items:center; gap:15px;">
                                <b style="font-size: 0.9rem;">${formatCurrency(e.value)}</b>
                                ${isAdmin ? `<span onclick="editEntry(${e.id})">✏️</span><span onclick="deleteEntry(${e.id})">🗑️</span>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            cont.appendChild(div);
        });

        updateWhatsapp(hoje);
        renderChart(segTotals);
    }

    function toggleDay(date) { openDays[date] = !openDays[date]; render(); }
    function formatCurrency(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function updateWhatsapp(hoje) {
        let msg = "*PREVISÃO DE CRÉDITOS - RESGATE 116*\n\n";
        const proximos = entries.filter(e => e.date >= hoje).sort((a,b) => a.date.localeCompare(b.date));
        const groups = proximos.reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});
        Object.keys(groups).slice(0,6).forEach(date => {
            const total = groups[date].reduce((s, x) => s + x.value, 0);
            msg += `🗓️ ${date.split('-').reverse().slice(0,2).join('/')}: *${formatCurrency(total)}*\n`;
        });
        document.getElementById('msg-preview').innerText = msg;
    }

    function copyText() {
        const text = document.getElementById('msg-preview').innerText;
        navigator.clipboard.writeText(text);
        alert("Texto copiado para o WhatsApp!");
    }

    // CRUD
    document.getElementById('entry-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const val = parseFloat(document.getElementById('input-value').value.replace(/\./g, '').replace(',', '.'));
        const entry = {
            date: document.getElementById('input-date').value,
            seguradora: document.getElementById('input-seguradora').value.toUpperCase(),
            value: val,
            desc: document.getElementById('input-desc').value.toUpperCase()
        };
        if(id) await _supabase.from('entries').update(entry).eq('id', id);
        else await _supabase.from('entries').insert([entry]);
        document.getElementById('entry-form').reset();
        document.getElementById('edit-id').value = '';
        fetchEntries();
    });

    function editEntry(id) {
        const e = entries.find(x => x.id == id);
        document.getElementById('edit-id').value = e.id;
        document.getElementById('input-date').value = e.date;
        document.getElementById('input-seguradora').value = e.seguradora;
        document.getElementById('input-value').value = e.value.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        document.getElementById('input-desc').value = e.desc || '';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function deleteEntry(id) { if(confirm('Excluir?')) { await _supabase.from('entries').delete().eq('id', id); fetchEntries(); } }

    function renderChart(segTotals) {
        const ctx = document.getElementById('pieChart').getContext('2d');
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: Object.keys(segTotals), datasets: [{ data: Object.values(segTotals), backgroundColor: ['#e11d48', '#10b981', '#3b82f6', '#facc15', '#8b5cf6'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '70%' }
        });
    }

    document.getElementById('input-value').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        v = (v / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        e.target.value = v;
    });

    function sendWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent(document.getElementById('msg-preview').innerText)}`, '_blank'); }

    fetchEntries();
</script>
</body>
</html>
