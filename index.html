<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - Grupo Resgate 116</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>💵</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #e11d48; --success: #10b981; --whatsapp: #25d366; 
            --bg: #0b0e14; --card-bg: #161b22; --text-main: #f8fafc;
            --border: #30363d; --highlight-yellow: #facc15;
        }
        [data-theme="light"] {
            --bg: #f8fafc; --card-bg: #ffffff; --text-main: #0f172a;
            --border: #e2e8f0; --highlight-yellow: #eab308;
        }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; padding: 20px; margin: 0; transition: 0.3s; }
        
        #cursor-dot { width: 8px; height: 8px; background: var(--primary); position: fixed; border-radius: 50%; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); }
        #cursor-outline { width: 40px; height: 40px; border: 2px solid var(--primary); position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999; transition: 0.1s ease-out; transform: translate(-50%, -50%); }

        .container { max-width: 1550px; margin: 0 auto; }
        header { display: flex; align-items: center; margin-bottom: 30px; padding: 25px 40px; background: var(--card-bg); border-radius: 25px; border: 1px solid var(--border); flex-wrap: wrap; gap: 20px; }
        .logo-box { display: flex; align-items: center; gap: 25px; }
        .logo-img { height: 100px; }
        .dev-info h1 { font-size: 1.8rem; font-weight: 900; color: var(--primary); margin: 0; }
        .dev-tag { background: var(--primary); color: white; padding: 5px 15px; border-radius: 6px; font-size: 0.8rem; font-weight: 900; display: inline-block; margin-top: 5px; }
        
        .header-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 35px; }
        .stat-card { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--border); border-bottom: 4px solid var(--primary); }
        .destaque-amarelo { border: 2.5px solid var(--highlight-yellow) !important; box-shadow: 0 4px 15px rgba(250, 204, 21, 0.1); }

        .dashboard-grid { display: grid; grid-template-columns: 380px 1fr 380px; gap: 25px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 22px; border: 1px solid var(--border); margin-bottom: 25px; }
        
        .btn { padding: 14px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; color: white; text-transform: uppercase; font-size: 0.75rem; }
        .btn-primary { background: var(--primary); }
        .btn-outline { background: var(--border); color: var(--text-main); }
        
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(128,128,128,0.05); color: var(--text-main); border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; }
        .day-group { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 15px; overflow: hidden; background: var(--card-bg); }
        .day-header { display: flex; justify-content: space-between; align-items: center; padding: 18px; background: rgba(128,128,128,0.05); cursor: pointer; }
        .day-content { display: none; padding: 18px; border-top: 1px solid var(--border); }
        .day-group.active .day-content { display: block; }
        .entry-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        
        #history-list { max-height: 400px; overflow-y: auto; }
        .history-item { font-size: 0.75rem; padding: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        .action-icons { display: flex; align-items: center; gap: 12px; }
        .icon-btn { cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .icon-btn:hover { opacity: 1; transform: scale(1.1); }

        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            header { justify-content: center; padding: 20px; }
            .header-actions { margin-left: 0; width: 100%; justify-content: space-between; }
            .btn { flex: 1; padding: 10px; font-size: 0.6rem; }
            #cursor-dot, #cursor-outline { display: none; }
        }
    </style>
</head>
<body data-theme="dark">
    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>

    <div class="container">
        <header>
            <div class="logo-box">
                <img src="logo-resgate.png" class="logo-img" alt="Logo" onerror="this.src='https://via.placeholder.com/150x100?text=LOGO'">
                <div class="dev-info">
                    <h1>RESGATE 116</h1>
                    <div class="dev-tag">SISTEMA DEV: PATRICK ALMEIDA</div>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="toggleTheme()">🌓 TEMA</button>
                <button class="btn btn-outline" onclick="exportData()">EXPORTAR</button>
                <button class="btn btn-primary" onclick="fetchEntries()">🔄 SINCRONIZAR</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card destaque-amarelo"><h3>Hoje</h3><div class="value" id="stat-hoje" style="color: var(--success)">R$ 0,00</div></div>
            <div class="stat-card destaque-amarelo"><h3>Restante</h3><div class="value" id="stat-restante" style="color: var(--success)">R$ 0,00</div></div>
            <div class="stat-card"><h3>Liquidados</h3><div class="value" id="stat-liquidados">R$ 0,00</div></div>
            <div class="stat-card"><h3>Total</h3><div class="value" id="stat-total" style="color: var(--primary)">R$ 0,00</div></div>
        </div>

        <div class="dashboard-grid">
            <div class="left-column">
                <div class="card" id="form-card" style="display: none;">
                    <div style="font-weight: 900; margin-bottom: 20px; text-transform: uppercase; color: var(--primary);">➕ Novo Lançamento</div>
                    <form id="entry-form">
                        <input type="hidden" id="edit-id">
                        <input type="date" id="input-date" required>
                        <input type="text" id="input-seguradora" placeholder="SEGURADORA" required>
                        <input type="text" id="input-value" placeholder="VALOR R$ 0,00" required>
                        <input type="text" id="input-desc" placeholder="NF / OBSERVAÇÃO">
                        <button type="submit" class="btn btn-primary" style="width: 100%;">SALVAR</button>
                    </form>
                </div>
                <div class="card">
                    <div style="font-weight: 800; font-size: 0.7rem; margin-bottom: 15px; opacity: 0.7;">DIVISÃO POR SEGURADORA</div>
                    <canvas id="barChart" style="height: 200px;"></canvas>
                </div>
                <div class="card">
                    <div style="font-weight: 900; font-size: 0.75rem; margin-bottom: 15px; color: var(--primary);">📜 HISTÓRICO (LIQUIDADOS)</div>
                    <div id="history-list"></div>
                </div>
            </div>
            
            <div class="center-column">
                <div id="list-container"></div>
            </div>
            
            <div class="right-column">
                <div class="card">
                    <div style="font-weight: 900; margin-bottom: 20px; text-transform: uppercase;">📱 Resumo WhatsApp</div>
                    <div id="msg-preview" style="background: #000; color: #10b981; padding: 20px; border-radius: 12px; font-family: monospace; white-space: pre-wrap; font-size: 0.85rem; border: 1px solid var(--border); margin-bottom: 15px;">Carregando...</div>
                    <button class="btn btn-outline" style="width: 100%; margin-bottom: 10px;" onclick="copyText()">📋 COPIAR TEXTO</button>
                    <button class="btn" style="width: 100%; background: var(--whatsapp);" onclick="sendWhatsApp()">🚀 ENVIAR WHATSAPP</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MASTER_PASS = "Murrilho123*";
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('admin') === 'true';
        if (isAdmin) document.getElementById('form-card').style.display = 'block';

        // Custom Cursor
        window.addEventListener('mousemove', (e) => {
            document.getElementById('cursor-dot').style.left = e.clientX + 'px';
            document.getElementById('cursor-dot').style.top = e.clientY + 'px';
            document.getElementById('cursor-outline').style.left = e.clientX + 'px';
            document.getElementById('cursor-outline').style.top = e.clientY + 'px';
        });

        function toggleTheme() {
            const body = document.body;
            const next = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
        document.body.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');

        const SUPABASE_URL = 'https://glmyblygbvhpluwncbtm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsbXlibHlnYnZocGx1d25jYnRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDY2MTQsImV4cCI6MjA5MTEyMjYxNH0.PqdwEYVYXIvOh2pYqQwaq8eyf2ZWS6BalQzOpINrXts';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let entries = [];
        let openDays = {};

        async function fetchEntries() {
            const { data } = await _supabase.from('entries').select('*').order('date', { ascending: true });
            entries = data || [];
            render();
        }

        function render() {
            const hojeStr = new Date().toLocaleDateString('en-CA'); 
            let sHoje = 0, sRestante = 0, sLiq = 0, sTotal = 0, segTotals = {};
            
            const listCont = document.getElementById('list-container');
            const histCont = document.getElementById('history-list');
            listCont.innerHTML = '';
            histCont.innerHTML = '';

            const groups = {};
            const historyItems = [];

            entries.forEach(e => {
                sTotal += e.value;
                segTotals[e.seguradora] = (segTotals[e.seguradora] || 0) + e.value;

                if (e.date >= hojeStr) {
                    if (e.date === hojeStr) sHoje += e.value;
                    sRestante += e.value;
                    groups[e.date] = groups[e.date] || [];
                    groups[e.date].push(e);
                } else {
                    sLiq += e.value;
                    historyItems.push(e);
                }
            });

            document.getElementById('stat-hoje').innerText = formatCurrency(sHoje);
            document.getElementById('stat-restante').innerText = formatCurrency(sRestante);
            document.getElementById('stat-liquidados').innerText = formatCurrency(sLiq);
            document.getElementById('stat-total').innerText = formatCurrency(sTotal);

            // Render Feed Central (Próximos)
            Object.keys(groups).sort().forEach(date => {
                const totalDia = groups[date].reduce((s, x) => s + x.value, 0);
                const div = document.createElement('div');
                div.className = `day-group ${openDays[date] ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="day-header" onclick="toggleDay('${date}')">
                        <span>📅 <b>${date.split('-').reverse().slice(0,2).join('/')}</b></span>
                        <span style="color:var(--success); font-weight:900;">${formatCurrency(totalDia)}</span>
                    </div>
                    <div class="day-content">
                        ${groups[date].map(e => `
                            <div class="entry-row">
                                <span><b>${e.seguradora}</b> <small style="display:block; opacity:0.6">${e.desc || ''}</small></span>
                                <div class="action-icons">
                                    <b>${formatCurrency(e.value)}</b>
                                    ${isAdmin ? `
                                        <span class="icon-btn" onclick="editEntry(${e.id})">✏️</span>
                                        <span class="icon-btn" onclick="deleteEntry(${e.id})">🗑️</span>
                                    ` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
                listCont.appendChild(div);
            });

            // Render Histórico (Já pagos)
            historyItems.sort((a,b) => b.date.localeCompare(a.date)).forEach(e => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span>${e.date.split('-').reverse().slice(0,2).join('/')} - ${e.seguradora}</span>
                    <div class="action-icons">
                        <b>${formatCurrency(e.value)}</b>
                        ${isAdmin ? `<span class="icon-btn" onclick="deleteEntry(${e.id})" style="font-size:10px;">🗑️</span>` : ''}
                    </div>`;
                histCont.appendChild(div);
            });

            updateWhatsapp(hojeStr);
            renderChart(segTotals);
        }

        function toggleDay(date) { openDays[date] = !openDays[date]; render(); }
        function formatCurrency(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        function updateWhatsapp(hoje) {
            let msg = "*PREVISÃO DE CRÉDITOS - RESGATE 116*\n\n";
            const proximos = entries.filter(e => e.date >= hoje).sort((a,b) => a.date.localeCompare(b.date));
            const groups = proximos.reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});
            Object.keys(groups).slice(0,7).forEach(date => {
                const total = groups[date].reduce((s, x) => s + x.value, 0);
                msg += `🗓️ ${date.split('-').reverse().slice(0,2).join('/')}: *${formatCurrency(total)}*\n`;
            });
            document.getElementById('msg-preview').innerText = msg;
        }

        function renderChart(segTotals) {
            const ctx = document.getElementById('barChart').getContext('2d');
            if(window.myChart) window.myChart.destroy();
            const sorted = Object.entries(segTotals).sort((a,b) => b[1] - a[1]).slice(0, 6);
            window.myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: sorted.map(x => x[0]), datasets: [{ data: sorted.map(x => x[1]), backgroundColor: '#e11d48', borderRadius: 4 }] },
                options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { display: false }, ticks: { color: '#888', font: { size: 9 } } } } }
            });
        }

        function copyText() { navigator.clipboard.writeText(document.getElementById('msg-preview').innerText); alert("Resumo Copiado!"); }
        function sendWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent(document.getElementById('msg-preview').innerText)}`, '_blank'); }

        async function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(entries));
            const dl = document.createElement('a'); dl.href = dataStr; dl.download = "resgate_financeiro.json"; dl.click();
        }

        document.getElementById('input-value').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            v = (v / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            e.target.value = v;
        });

        document.getElementById('entry-form').onsubmit = async (e) => {
            e.preventDefault();
            if(prompt("Confirmação de Segurança - Senha Admin:") !== MASTER_PASS) return;
            const id = document.getElementById('edit-id').value;
            const val = parseFloat(document.getElementById('input-value').value.replace(/\./g, '').replace(',', '.'));
            const data = {
                date: document.getElementById('input-date').value,
                seguradora: document.getElementById('input-seguradora').value.toUpperCase(),
                value: val, desc: document.getElementById('input-desc').value.toUpperCase()
            };
            if(id) await _supabase.from('entries').update(data).eq('id', id);
            else await _supabase.from('entries').insert([data]);
            document.getElementById('entry-form').reset();
            document.getElementById('edit-id').value = '';
            fetchEntries();
        };

        function editEntry(id) {
            const e = entries.find(x => x.id == id);
            document.getElementById('edit-id').value = e.id;
            document.getElementById('input-date').value = e.date;
            document.getElementById('input-seguradora').value = e.seguradora;
            document.getElementById('input-value').value = e.value.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            document.getElementById('input-desc').value = e.desc || '';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        async function deleteEntry(id) { 
            if(confirm('Tem certeza que deseja apagar este registro?') && prompt("Confirme a Senha Admin para APAGAR:") === MASTER_PASS) { 
                await _supabase.from('entries').delete().eq('id', id); 
                fetchEntries(); 
            } 
        }

        fetchEntries();
    </script>
</body>
</html>
