<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - Grupo Resgate 116</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💵</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #e11d48; --success: #10b981; --whatsapp: #25d366; 
            --bg: #0b0e14; --card-bg: rgba(15, 23, 42, 0.95); --text-main: #f8fafc;
            --border: rgba(51, 65, 85, 1); --highlight-yellow: #facc15;
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --card-bg: #ffffff; --text-main: #0f172a;
            --border: #e2e8f0; --highlight-yellow: #eab308;
        }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; padding: 15px; margin: 0; min-height: 100vh; }

        /* HEADER ORGANIZADO */
        header { 
            display: flex; 
            justify-content: space-between; /* LOGO NA ESQUERDA, BOTÕES NA DIREITA */
            align-items: center; 
            margin-bottom: 25px; padding: 25px 40px; 
            background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border); 
        }

        .header-actions { display: flex; gap: 10px; align-items: center; }

        .logo-box { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 70px; }
        .dev-info h1 { font-size: 1.5rem; font-weight: 900; color: var(--primary); margin: 0; }
        
        /* BOTÕES */
        .btn { padding: 12px 18px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: var(--border); color: var(--text-main); }

        /* GRID E CARDS */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border); border-bottom: 4px solid var(--primary); }
        .stat-card .value { font-size: 1.6rem; font-weight: 900; }

        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }

        /* MOBILE */
        @media (max-width: 1024px) {
            header { flex-direction: column; text-align: center; gap: 20px; padding: 20px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .dashboard-grid { display: flex; flex-direction: column; }
            .header-actions { width: 100%; justify-content: center; }
        }

        .admin-only { display: none; }
        #cursor-dot, #cursor-outline { position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999; }
        #cursor-dot { width: 8px; height: 8px; background: var(--primary); }
        #cursor-outline { width: 40px; height: 40px; border: 2px solid var(--primary); transition: 0.1s; }
    </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-outline"></div>

<div class="container">
    <header>
        <div class="logo-box">
            <img src="logo-resgate.png" class="logo-img" alt="Logo" onerror="this.src='https://via.placeholder.com/150x80?text=RESGATE+116'">
            <div class="dev-info">
                <h1>RESGATE 116</h1>
                <span style="font-size: 0.7rem; font-weight: 800; opacity: 0.7;">PATRICK ALMEIDA</span>
            </div>
        </div>

        <div class="header-actions">
            <button class="btn btn-outline" style="width: 50px;" onclick="toggleTheme()">🌓</button>
            <div class="admin-only" id="export-btn-container">
                <button class="btn btn-outline" onclick="exportData()">EXPORTAR</button>
            </div>
            <button class="btn btn-primary" onclick="fetchEntries()">🔄 SINCRONIZAR</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><h3>Hoje</h3><div class="value" id="stat-hoje" style="color: var(--success)">R$ 0,00</div></div>
        <div class="stat-card"><h3>Restante</h3><div class="value" id="stat-restante" style="color: var(--success)">R$ 0,00</div></div>
        <div class="stat-card"><h3>Liquidados</h3><div class="value" id="stat-liquidados">R$ 0,00</div></div>
        <div class="stat-card"><h3>Total</h3><div class="value" id="stat-total" style="color: var(--primary)">R$ 0,00</div></div>
    </div>

    <div class="dashboard-grid">
        <div class="left-column">
            <div class="card admin-only" id="form-card">
                <div style="font-weight: 900; margin-bottom: 15px; font-size: 0.8rem; text-transform: uppercase;">➕ Novo Lançamento</div>
                <form id="entry-form">
                    <input type="hidden" id="edit-id">
                    <input type="date" id="input-date" required>
                    <input type="text" id="input-seguradora" placeholder="SEGURADORA" required>
                    <input type="text" id="input-value" placeholder="VALOR R$ 0,00" required>
                    <input type="text" id="input-desc" placeholder="NF / OBSERVAÇÃO">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">AGENDAR ENTRADA</button>
                </form>
            </div>
            <div class="card"><canvas id="pieChart" style="max-height: 200px;"></canvas></div>
        </div>

        <div class="center-column">
            <div id="list-container"></div>
        </div>

        <div class="right-column">
            <div class="card">
                <div style="font-weight: 900; margin-bottom: 15px; font-size: 0.8rem; text-transform: uppercase;">📱 Resumo WhatsApp</div>
                <div id="msg-preview" style="background: #0f172a; color: #10b981; padding: 15px; border-radius: 12px; font-family: monospace; white-space: pre-wrap; font-size: 0.85rem; border: 1px solid var(--border); margin-bottom: 10px;">Carregando...</div>
                <button class="btn btn-outline" style="width: 100%; margin-bottom: 10px;" onclick="copyText()">📋 COPIAR TEXTO</button>
                <button class="btn" style="width: 100%; background: var(--whatsapp); color: white;" onclick="sendWhatsApp()">🚀 ENVIAR GRUPO</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Mantenha toda a sua lógica de Script (Supabase, Auth, Render, etc.) aqui.
    // Certifique-se de manter a variável isAdmin e a função checkAuth que criamos.
    
    const MASTER_PASS = "Murrilho123*";
    function checkAuth() { 
        const pass = prompt("Digite a senha administrativa:"); 
        if(pass === MASTER_PASS) return true; 
        alert("Senha Incorreta!"); return false; 
    }

    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('admin') === 'true';
    if (isAdmin) { 
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
    }

    // ... (restante das funções fetchEntries, render, etc.)
</script>
</body>
</html>
