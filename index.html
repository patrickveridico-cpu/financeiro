<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro - Grupo Resgate 116</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #e11d48; --success: #10b981; --whatsapp: #25d366; 
            --bg: #0b0e14; --card-bg: rgba(15, 23, 42, 0.9); --text-main: #f8fafc;
            --border: rgba(51, 65, 85, 1); --highlight-yellow: #facc15;
        }

        /* 1. BACKGROUND COM TEXTURA E ESTILO */
        body { 
            background-color: var(--bg); 
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(225, 29, 72, 0.05) 0%, transparent 80%),
                radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 100% 100%, 30px 30px;
            color: var(--text-main); font-family: 'Inter', sans-serif; padding: 20px; 
            min-height: 100vh;
        }

        /* 2. EFEITO DO MOUSE (CURSOR) EM TUDO */
        * { cursor: pointer !important; }

        .container { max-width: 1500px; margin: 0 auto; }

        /* CABEÇALHO COM LOGO BEM MAIOR */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 35px; padding: 30px; background: var(--card-bg); 
            border-radius: 24px; border: 1px solid var(--border); backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .logo-box { display: flex; align-items: center; gap: 25px; }
        .logo-img { height: 120px; filter: drop-shadow(0 0 15px rgba(225, 29, 72, 0.4)); }
        .dev-tag { background: var(--primary); color: white; padding: 4px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 900; letter-spacing: 1px; margin-top: 5px; display: inline-block; }

        /* STATS DESTAQUE ENTRADAS (VERDE + AMARELO) */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 35px; }
        .stat-card { background: var(--card-bg); padding: 30px; border-radius: 22px; border: 1px solid var(--border); transition: 0.3s; position: relative; overflow: hidden; }
        
        .destaque-entrada { 
            background: linear-gradient(145deg, rgba(16, 185, 129, 0.2), rgba(15, 23, 42, 0.9)) !important;
            border: 3px solid var(--highlight-yellow) !important;
            box-shadow: 0 0 30px rgba(250, 204, 21, 0.2);
            transform: scale(1.03);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 20px rgba(250, 204, 21, 0.2); } 50% { box-shadow: 0 0 40px rgba(250, 204, 21, 0.4); } 100% { box-shadow: 0 0 20px rgba(250, 204, 21, 0.2); } }

        .stat-card h3 { font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 10px; font-weight: 800; }
        .stat-card .value { font-size: 1.8rem; font-weight: 900; }

        /* LAYOUT */
        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr 350px; gap: 30px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card-title { font-size: 0.9rem; font-weight: 900; margin-bottom: 20px; color: var(--primary); text-transform: uppercase; border-left: 4px solid var(--primary); padding-left: 10px; }

        input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: #07090e; color: white; margin-bottom: 15px; outline: none; font-weight: 600; }
        input:focus { border-color: var(--highlight-yellow); }

        .btn { padding: 16px; border-radius: 12px; font-weight: 800; border: none; width: 100%; transition: 0.2s; color: white; text-transform: uppercase; letter-spacing: 1px; }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); box-shadow: 0 10px 20px rgba(225, 29, 72, 0.3); }
        .btn-whatsapp { background: var(--whatsapp); box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); margin-top: 15px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); font-size: 0.7rem; }

        /* ACORDEÃO */
        .day-group { margin-bottom: 15px; border: 1px solid var(--border); border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .day-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 25px; background: rgba(30, 41, 59, 0.4); }
        .day-header:hover { background: rgba(255,255,255,0.05); }
        .day-content { display: none; padding: 20px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.4); }
        .day-group.active { border-color: var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .day-group.active .day-content { display: block; }
        .day-total { color: var(--success); font-weight: 900; font-size: 1.3rem; }

        .entry-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .action-icons span { margin-left: 15px; font-size: 1.3rem; }

        .msg-preview { background: #0b141a; color: #e9edef; padding: 20px; border-radius: 15px; font-family: 'Courier New', monospace; white-space: pre-wrap; font-size: 0.9rem; border: 1px dashed #25d366; }

        .tabs { display: flex; gap: 12px; margin-bottom: 25px; }
        .tab { flex: 1; text-align: center; padding: 15px; background: var(--border); border-radius: 12px; font-size: 0.8rem; font-weight: 900; color: #94a3b8; }
        .tab.active { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(225, 29, 72, 0.3); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-box">
            <img src="logo-resgate.png" class="logo-img" alt="Logo" onerror="this.src='https://via.placeholder.com/300x120/1e293b/e11d48?text=RESGATE+116'">
            <div>
                <h1 style="color:var(--primary); font-weight:900; font-size: 2rem; margin:0;">RESGATE 116</h1>
                <span class="dev-tag">DEV: PATRICK ALMEIDA</span>
            </div>
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-outline" style="width:auto;" onclick="exportData()">📥 EXPORTAR JSON</button>
            <button class="btn btn-outline" style="width:auto;" onclick="document.getElementById('import-file').click()">📤 IMPORTAR JSON</button>
            <input type="file" id="import-file" style="display:none;" onchange="importData(event)">
            <button class="btn btn-primary" style="width:auto; padding: 0 25px;" onclick="fetchEntries()">🔄 ATUALIZAR</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card destaque-entrada"><h3>Previsão Hoje</h3><div class="value" id="stat-hoje">R$ 0,00</div></div>
        <div class="stat-card destaque-entrada"><h3>Restante do Mês</h3><div class="value" id="stat-restante">R$ 0,00</div></div>
        <div class="stat-card"><h3>Já Liquidados</h3><div class="value" id="stat-liquidados">R$ 0,00</div></div>
        <div class="stat-card"><h3>Movimentação Total</h3><div class="value" id="stat-total">R$ 0,00</div></div>
    </div>

    <div class="dashboard-grid">
        <div class="left-column">
            <div class="card">
                <div class="card-title">Lançar Novo Crédito</div>
                <form id="entry-form">
                    <input type="hidden" id="edit-id">
                    <input type="date" id="input-date" required>
                    <input type="text" id="input-seguradora" placeholder="Seguradora / Cliente" required>
                    <input type="text" id="input-value" placeholder="Valor R$ 0,00" required>
                    <input type="text" id="input-desc" placeholder="Nota Fiscal / Ref.">
                    <button type="submit" id="btn-submit" class="btn btn-primary">SALVAR AGORA</button>
                </form>
            </div>
            <div class="card"><div class="card-title">Market Share</div><div style="height:200px"><canvas id="pieChart"></canvas></div></div>
        </div>

        <div class="center-column">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('proximos')" id="tab-proximos">A RECEBER</div>
                <div class="tab" onclick="switchTab('historico')" id="tab-historico">HISTÓRICO</div>
            </div>
            <div id="list-container"></div>
        </div>

        <div class="right-column">
            <div class="card">
                <div class="card-title">Resumo WhatsApp</div>
                <div id="msg-preview" class="msg-preview">Aguardando...</div>
                <button class="btn btn-whatsapp" onclick="sendWhatsApp()">🚀 ENVIAR AO GRUPO</button>
                <button class="btn btn-outline" style="margin-top:12px" onclick="copyToClipboard()">📋 COPIAR MENSAGEM</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://glmyblygbvhpluwncbtm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsbXlibHlnYnZocGx1d25jYnRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDY2MTQsImV4cCI6MjA5MTEyMjYxNH0.PqdwEYVYXIvOh2pYqQwaq8eyf2ZWS6BalQzOpINrXts';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let entries = [];
    let currentTab = 'proximos';
    let openDays = {};

    async function fetchEntries() {
        const { data, error } = await _supabase.from('entries').select('*').order('date', { ascending: true });
        if (!error) { entries = data; render(); }
    }

    function render() {
        const hoje = new Date().toISOString().split('T')[0];
        const mesAtual = new Date().getMonth();
        let sHoje = 0, sRestante = 0, sLiq = 0, sTotal = 0;
        let segTotals = {};

        entries.forEach(e => {
            const d = new Date(e.date + 'T12:00:00');
            if (d.getMonth() === mesAtual) {
                sTotal += e.value;
                if (e.date >= hoje) sRestante += e.value;
                else sLiq += e.value;
            }
            if (e.date === hoje) sHoje += e.value;
            segTotals[e.seguradora] = (segTotals[e.seguradora] || 0) + e.value;
        });

        document.getElementById('stat-hoje').innerText = formatCurrency(sHoje);
        document.getElementById('stat-restante').innerText = formatCurrency(sRestante);
        document.getElementById('stat-liquidados').innerText = formatCurrency(sLiq);
        document.getElementById('stat-total').innerText = formatCurrency(sTotal);

        const filtered = entries.filter(e => currentTab === 'proximos' ? e.date >= hoje : e.date < hoje);
        const groups = filtered.reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});

        const cont = document.getElementById('list-container');
        cont.innerHTML = '';
        
        Object.keys(groups).sort((a,b) => currentTab === 'proximos' ? a.localeCompare(b) : b.localeCompare(a)).forEach(date => {
            const totalDia = groups[date].reduce((s, x) => s + x.value, 0);
            const div = document.createElement('div');
            div.className = `day-group ${openDays[date] ? 'active' : ''}`;
            div.innerHTML = `
                <div class="day-header" onclick="toggleDay('${date}')">
                    <span>📅 <b>${date.split('-').reverse().slice(0,2).join('/')}</b></span>
                    <span class="day-total">${formatCurrency(totalDia)}</span>
                </div>
                <div class="day-content">
                    ${groups[date].map(e => `
                        <div class="entry-row">
                            <span><b>${e.seguradora}</b> <small style="color:#64748b">${e.desc || ''}</small></span>
                            <div class="action-icons">
                                <b>${formatCurrency(e.value)}</b>
                                <span onclick="editEntry(${e.id})">✏️</span>
                                <span onclick="deleteEntry(${e.id})">🗑️</span>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            cont.appendChild(div);
        });

        updateWhatsapp(hoje);
        const ctx = document.getElementById('pieChart').getContext('2d');
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: Object.keys(segTotals), datasets: [{ data: Object.values(segTotals), backgroundColor: ['#e11d48', '#10b981', '#3b82f6', '#facc15', '#8b5cf6'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '75%' }
        });
    }

    function toggleDay(date) { openDays[date] = !openDays[date]; render(); }

    function updateWhatsapp(hoje) {
        let msg = "*Previsões de crédito para a semana:*\n\n";
        const proximos = entries.filter(e => e.date >= hoje).sort((a,b) => a.date.localeCompare(b.date));
        const groups = proximos.reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});
        const diasSemana = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];

        Object.keys(groups).slice(0,7).forEach(date => {
            const dataObj = new Date(date + 'T12:00:00');
            const dataFmt = date.split('-').reverse().slice(0,2).join('/');
            const diaNome = diasSemana[dataObj.getDay()];
            const totalDia = groups[date].reduce((s, x) => s + x.value, 0);
            msg += `${dataFmt} ${diaNome}: *${formatCurrency(totalDia)}*\n\n`;
        });
        document.getElementById('msg-preview').innerText = msg;
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(entries));
        const dl = document.createElement('a');
        dl.setAttribute("href", dataStr);
        dl.setAttribute("download", "resgate_116_backup.json");
        dl.click();
    }

    async function importData(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = JSON.parse(e.target.result);
            if(confirm(`Importar ${data.length} registros?`)) {
                for (const item of data) { delete item.id; await _supabase.from('entries').insert([item]); }
                fetchEntries();
            }
        };
        reader.readAsText(file);
    }

    document.getElementById('entry-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const val = parseFloat(document.getElementById('input-value').value.replace(/\./g, '').replace(',', '.'));
        const entry = {
            date: document.getElementById('input-date').value,
            seguradora: document.getElementById('input-seguradora').value.toUpperCase(),
            value: val,
            desc: document.getElementById('input-desc').value.toUpperCase()
        };
        if (id) await _supabase.from('entries').update(entry).eq('id', id);
        else await _supabase.from('entries').insert([entry]);
        document.getElementById('entry-form').reset();
        document.getElementById('edit-id').value = '';
        fetchEntries();
    });

    function editEntry(id) {
        const e = entries.find(x => x.id == id);
        document.getElementById('edit-id').value = e.id;
        document.getElementById('input-date').value = e.date;
        document.getElementById('input-seguradora').value = e.seguradora;
        document.getElementById('input-value').value = e.value.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        document.getElementById('input-desc').value = e.desc || '';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function deleteEntry(id) {
        if(confirm('Apagar lançamento?')) { await _supabase.from('entries').delete().eq('id', id); fetchEntries(); }
    }

    function formatCurrency(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
    function switchTab(t) { currentTab = t; render(); }
    function copyToClipboard() { navigator.clipboard.writeText(document.getElementById('msg-preview').innerText).then(() => alert("Copiado!")); }
    function sendWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent(document.getElementById('msg-preview').innerText)}`, '_blank'); }

    document.getElementById('input-value').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        v = (v / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        e.target.value = v;
    });

    document.getElementById('input-date').valueAsDate = new Date();
    fetchEntries();
</script>
</body>
</html>
