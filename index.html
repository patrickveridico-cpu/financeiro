<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro - Grupo Resgate 116</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #e11d48; --success: #10b981; --whatsapp: #25d366; 
            --bg: #0b0e14; --card-bg: rgba(15, 23, 42, 0.95); --text-main: #f8fafc;
            --border: rgba(51, 65, 85, 1); --highlight-yellow: #facc15;
        }

        /* FUNDO COM TEXTURA E ESTILO */
        body { 
            background-color: var(--bg); 
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0),
                radial-gradient(circle at 50% 0%, rgba(225, 29, 72, 0.1) 0%, transparent 70%);
            background-size: 30px 30px, 100% 100%;
            color: var(--text-main); font-family: 'Inter', sans-serif; padding: 20px; 
            min-height: 100vh; margin: 0;
            overflow-x: hidden;
        }

        /* CURSOR CUSTOMIZADO */
        #cursor-dot {
            width: 8px; height: 8px; background: var(--primary);
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 10000;
        }
        #cursor-outline {
            width: 40px; height: 40px; border: 2px solid var(--primary);
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999;
            transition: transform 0.15s ease-out, opacity 0.3s ease;
            box-shadow: 0 0 15px rgba(225, 29, 72, 0.3);
        }

        /* FORÇAR MÃOZINHA EM TUDO */
        button, a, .day-header, span, input, select, .tab { cursor: pointer !important; }

        .container { max-width: 1500px; margin: 0 auto; }

        /* CABEÇALHO GIGANTE */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; padding: 40px; background: var(--card-bg); 
            border-radius: 30px; border: 1px solid var(--border); backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }
        .logo-box { display: flex; align-items: center; gap: 35px; }
        .logo-img { height: 140px; filter: drop-shadow(0 0 20px rgba(225, 29, 72, 0.5)); }
        .dev-info h1 { font-size: 2.5rem; font-weight: 900; color: var(--primary); margin: 0; }
        .dev-tag { background: var(--primary); color: white; padding: 5px 15px; border-radius: 8px; font-size: 0.8rem; font-weight: 900; margin-top: 10px; display: inline-block; }

        /* MODO ADMIN / VISITANTE */
        .admin-only { display: none; }

        /* STATS COM CÍRCULO AMARELO */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 35px; }
        .stat-card { background: var(--card-bg); padding: 30px; border-radius: 25px; border: 1px solid var(--border); }
        .destaque-entrada { 
            border: 3px solid var(--highlight-yellow) !important;
            background: linear-gradient(145deg, rgba(16, 185, 129, 0.15), transparent) !important;
            box-shadow: 0 0 30px rgba(250, 204, 21, 0.1);
        }
        .stat-card h3 { font-size: 0.75rem; color: #94a3b8; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }
        .stat-card .value { font-size: 2rem; font-weight: 900; color: var(--success); }

        /* GRID */
        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr 350px; gap: 30px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 22px; border: 1px solid var(--border); margin-bottom: 25px; }
        .card-title { font-weight: 900; color: var(--primary); margin-bottom: 20px; font-size: 0.9rem; text-transform: uppercase; border-left: 4px solid var(--primary); padding-left: 10px; }

        input { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; color: #fff; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; }

        .btn { padding: 16px; border-radius: 14px; font-weight: 900; border: none; width: 100%; transition: 0.2s; color: white; text-transform: uppercase; }
        .btn-primary { background: var(--primary); box-shadow: 0 10px 20px rgba(225, 29, 72, 0.2); }
        .btn-whatsapp { background: var(--whatsapp); margin-top: 15px; }

        /* LISTA SANFONA */
        .day-group { margin-bottom: 15px; border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
        .day-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 25px; background: rgba(30, 41, 59, 0.5); }
        .day-content { display: none; padding: 20px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.4); }
        .day-group.active .day-content { display: block; }

        .entry-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .action-icons span { margin-left: 12px; font-size: 1.2rem; filter: grayscale(1); transition: 0.2s; }
        .action-icons span:hover { filter: grayscale(0); transform: scale(1.2); }

        .msg-preview { background: #0b141a; color: #e9edef; padding: 20px; border-radius: 15px; font-family: 'Courier New', monospace; white-space: pre-wrap; border: 1px dashed var(--whatsapp); font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-outline"></div>

<div class="container">
    <header>
        <div class="logo-box">
            <img src="logo-resgate.png" class="logo-img" alt="Logo" onerror="this.src='https://via.placeholder.com/300x150/1e293b/e11d48?text=RESGATE+116'">
            <div class="dev-info">
                <h1>RESGATE 116</h1>
                <span class="dev-tag">DEV: PATRICK ALMEIDA</span>
            </div>
        </div>
        <div style="display: flex; gap: 12px;">
            <div id="admin-tools" class="admin-only" style="display: none;">
                <div style="display: flex; gap: 12px;">
                    <button class="btn" style="background:var(--border); width:auto; font-size:0.7rem; padding: 0 15px;" onclick="exportData()">EXPORTAR JSON</button>
                    <button class="btn" style="background:var(--border); width:auto; font-size:0.7rem; padding: 0 15px;" onclick="document.getElementById('import-file').click()">IMPORTAR JSON</button>
                    <input type="file" id="import-file" style="display:none;" onchange="importData(event)">
                </div>
            </div>
            <button class="btn btn-primary" style="width:auto; padding: 0 30px;" onclick="fetchEntries()">🔄 SINCRONIZAR</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card destaque-entrada"><h3>Previsto Hoje</h3><div class="value" id="stat-hoje">R$ 0,00</div></div>
        <div class="stat-card destaque-entrada"><h3>Restante do Mês</h3><div class="value" id="stat-restante">R$ 0,00</div></div>
        <div class="stat-card"><h3>Já Liquidados</h3><div class="value" id="stat-liquidados" style="color:white">R$ 0,00</div></div>
        <div class="stat-card"><h3>Total Bruto</h3><div class="value" id="stat-total" style="color:var(--primary)">R$ 0,00</div></div>
    </div>

    <div class="dashboard-grid">
        <div class="left-column">
            <div class="card admin-only" id="form-card" style="display: none;">
                <div class="card-title">Lançar Crédito</div>
                <form id="entry-form">
                    <input type="hidden" id="edit-id">
                    <input type="date" id="input-date" required>
                    <input type="text" id="input-seguradora" placeholder="SEGURADORA" required>
                    <input type="text" id="input-value" placeholder="VALOR R$ 0,00" required>
                    <input type="text" id="input-desc" placeholder="NF / OBSERVAÇÃO">
                    <button type="submit" class="btn btn-primary">SALVAR NO BANCO</button>
                </form>
            </div>
            <div class="card" style="height:250px"><canvas id="pieChart"></canvas></div>
        </div>

        <div class="center-column">
            <div id="list-container"></div>
        </div>

        <div class="right-column">
            <div class="card">
                <div class="card-title">Resumo Semanal</div>
                <div id="msg-preview" class="msg-preview">Carregando...</div>
                <button class="btn btn-whatsapp" onclick="sendWhatsApp()">🚀 ENVIAR AO GRUPO</button>
            </div>
        </div>
    </div>
</div>

<script>
    // LÓGICA DO CURSOR
    const dot = document.getElementById('cursor-dot');
    const outline = document.getElementById('cursor-outline');
    window.addEventListener('mousemove', (e) => {
        dot.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
        outline.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
    });

    // SISTEMA DE ACESSO
    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('admin') === 'true';
    if (isAdmin) {
        document.getElementById('admin-tools').style.display = 'block';
        document.getElementById('form-card').style.display = 'block';
    }

    // CONEXÃO SUPABASE
    const SUPABASE_URL = 'https://glmyblygbvhpluwncbtm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsbXlibHlnYnZocGx1d25jYnRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDY2MTQsImV4cCI6MjA5MTEyMjYxNH0.PqdwEYVYXIvOh2pYqQwaq8eyf2ZWS6BalQzOpINrXts';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let entries = [];
    let openDays = {};

    async function fetchEntries() {
        const { data } = await _supabase.from('entries').select('*').order('date', { ascending: true });
        entries = data || [];
        render();
    }

    function render() {
        const hoje = new Date().toISOString().split('T')[0];
        const mesAtual = new Date().getMonth();
        let sHoje = 0, sRestante = 0, sLiq = 0, sTotal = 0;
        let segTotals = {};

        entries.forEach(e => {
            const d = new Date(e.date + 'T12:00:00');
            if (d.getMonth() === mesAtual) {
                sTotal += e.value;
                if (e.date >= hoje) sRestante += e.value;
                else sLiq += e.value;
            }
            if (e.date === hoje) sHoje += e.value;
            segTotals[e.seguradora] = (segTotals[e.seguradora] || 0) + e.value;
        });

        document.getElementById('stat-hoje').innerText = formatCurrency(sHoje);
        document.getElementById('stat-restante').innerText = formatCurrency(sRestante);
        document.getElementById('stat-liquidados').innerText = formatCurrency(sLiq);
        document.getElementById('stat-total').innerText = formatCurrency(sTotal);

        const filtered = entries.filter(e => e.date >= hoje);
        const groups = filtered.reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});
        const cont = document.getElementById('list-container');
        cont.innerHTML = '';
        
        Object.keys(groups).forEach(date => {
            const totalDia = groups[date].reduce((s, x) => s + x.value, 0);
            const div = document.createElement('div');
            div.className = `day-group ${openDays[date] ? 'active' : ''}`;
            div.innerHTML = `
                <div class="day-header" onclick="toggleDay('${date}')">
                    <span>📅 <b>${date.split('-').reverse().slice(0,2).join('/')}</b></span>
                    <span style="color:var(--success); font-weight:900;">${formatCurrency(totalDia)}</span>
                </div>
                <div class="day-content">
                    ${groups[date].map(e => `
                        <div class="entry-row">
                            <span>
                                <b style="color:var(--primary)">${e.seguradora}</b> 
                                <br><small style="color:#94a3b8">NF/OBS: ${e.desc || 'Não informada'}</small>
                            </span>
                            <div style="display:flex; align-items:center; gap:15px;">
                                <b style="color:white">${formatCurrency(e.value)}</b>
                                ${isAdmin ? `
                                    <div class="action-icons">
                                        <span onclick="editEntry(${e.id})">✏️</span>
                                        <span onclick="deleteEntry(${e.id})">🗑️</span>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            cont.appendChild(div);
        });

        updateWhatsapp(hoje);
        // Chart
        const ctx = document.getElementById('pieChart').getContext('2d');
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: Object.keys(segTotals), datasets: [{ data: Object.values(segTotals), backgroundColor: ['#e11d48', '#10b981', '#3b82f6', '#facc15', '#8b5cf6'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '75%' }
        });
    }

    function toggleDay(date) { openDays[date] = !openDays[date]; render(); }
    function formatCurrency(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function updateWhatsapp(hoje) {
        let msg = "*PREVISÃO DE CRÉDITOS - RESGATE 116*\n\n";
        const proximos = entries.filter(e => e.date >= hoje).sort((a,b) => a.date.localeCompare(b.date));
        const groups = proximos.reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});
        Object.keys(groups).slice(0,5).forEach(date => {
            const total = groups[date].reduce((s, x) => s + x.value, 0);
            msg += `📅 ${date.split('-').reverse().slice(0,2).join('/')}: *${formatCurrency(total)}*\n`;
        });
        document.getElementById('msg-preview').innerText = msg;
    }

    // CRUD
    document.getElementById('entry-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const val = parseFloat(document.getElementById('input-value').value.replace(/\./g, '').replace(',', '.'));
        const entry = {
            date: document.getElementById('input-date').value,
            seguradora: document.getElementById('input-seguradora').value.toUpperCase(),
            value: val,
            desc: document.getElementById('input-desc').value.toUpperCase()
        };
        if(id) await _supabase.from('entries').update(entry).eq('id', id);
        else await _supabase.from('entries').insert([entry]);
        document.getElementById('entry-form').reset();
        document.getElementById('edit-id').value = '';
        fetchEntries();
    });

    function editEntry(id) {
        const e = entries.find(x => x.id == id);
        document.getElementById('edit-id').value = e.id;
        document.getElementById('input-date').value = e.date;
        document.getElementById('input-seguradora').value = e.seguradora;
        document.getElementById('input-value').value = e.value.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        document.getElementById('input-desc').value = e.desc || '';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function deleteEntry(id) {
        if(confirm('Deseja excluir este registro?')) { await _supabase.from('entries').delete().eq('id', id); fetchEntries(); }
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(entries));
        const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "backup_resgate.json"); dl.click();
    }

    async function importData(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = JSON.parse(e.target.result);
            for (const item of data) { delete item.id; await _supabase.from('entries').insert([item]); }
            fetchEntries();
        };
        reader.readAsText(file);
    }

    document.getElementById('input-value').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        v = (v / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        e.target.value = v;
    });

    function sendWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent(document.getElementById('msg-preview').innerText)}`, '_blank'); }

    fetchEntries();
</script>
</body>
</html>
