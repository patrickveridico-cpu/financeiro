<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro - Grupo Resgate 116</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #e11d48; --success: #10b981; --whatsapp: #25d366; 
            --bg: #0b0e14; --card-bg: rgba(15, 23, 42, 0.95); --text-main: #f8fafc;
            --border: rgba(51, 65, 85, 1); --highlight-yellow: #facc15;
        }

        /* FUNDO COM TEXTURA DE GRID E GRADIENTE */
        body { 
            background-color: var(--bg); 
            background-image: 
                linear-gradient(rgba(225, 29, 72, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(225, 29, 72, 0.02) 1px, transparent 1px),
                radial-gradient(circle at 50% 0%, rgba(225, 29, 72, 0.1) 0%, transparent 70%);
            background-size: 30px 30px, 30px 30px, 100% 100%;
            color: var(--text-main); font-family: 'Inter', sans-serif; padding: 20px; 
            min-height: 100vh; margin: 0;
            cursor: none !important; /* Esconde o mouse padrão para o efeito customizado */
        }

        /* EFEITO DO MOUSE CUSTOMIZADO */
        #custom-cursor {
            width: 20px; height: 20px; border: 2px solid var(--primary); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.1s ease;
            box-shadow: 0 0 15px var(--primary);
        }

        * { cursor: none !important; } /* Garante que o cursor customizado seja o único */

        .container { max-width: 1500px; margin: 0 auto; }

        /* BARRA DE ACESSO (LINKS) */
        .access-bar {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 15px;
        }
        .access-link {
            font-size: 0.7rem; font-weight: 800; text-decoration: none; color: #94a3b8;
            padding: 5px 15px; border: 1px solid var(--border); border-radius: 20px; transition: 0.3s;
        }
        .access-link:hover { color: var(--primary); border-color: var(--primary); background: rgba(225, 29, 72, 0.1); }

        /* CABEÇALHO GIGANTE */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; padding: 40px; background: var(--card-bg); 
            border-radius: 30px; border: 1px solid var(--border); backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }
        .logo-box { display: flex; align-items: center; gap: 35px; }
        .logo-img { height: 140px; filter: drop-shadow(0 0 20px rgba(225, 29, 72, 0.5)); }
        .dev-info h1 { font-size: 2.5rem; font-weight: 900; color: var(--primary); margin: 0; line-height: 1; }
        .dev-tag { background: var(--primary); color: white; padding: 5px 15px; border-radius: 8px; font-size: 0.8rem; font-weight: 900; margin-top: 10px; display: inline-block; }

        /* STATS DESTAQUE */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 35px; }
        .stat-card { background: var(--card-bg); padding: 30px; border-radius: 25px; border: 1px solid var(--border); position: relative; }
        
        .destaque-entrada { 
            border: 3px solid var(--highlight-yellow) !important;
            background: linear-gradient(145deg, rgba(16, 185, 129, 0.2), transparent) !important;
            box-shadow: 0 0 40px rgba(250, 204, 21, 0.15);
            transform: scale(1.02);
        }
        .stat-card .value { font-size: 2rem; font-weight: 900; color: var(--success); }

        /* GRID */
        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr 350px; gap: 30px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 22px; border: 1px solid var(--border); margin-bottom: 25px; }
        
        .btn { padding: 16px; border-radius: 14px; font-weight: 900; border: none; width: 100%; transition: 0.2s; color: white; text-transform: uppercase; }
        .btn-primary { background: var(--primary); box-shadow: 0 10px 25px rgba(225, 29, 72, 0.4); }
        .btn-whatsapp { background: var(--whatsapp); margin-top: 15px; }

        /* LISTA SANFONA */
        .day-group { margin-bottom: 15px; border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
        .day-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 25px; background: rgba(30, 41, 59, 0.5); }
        .day-content { display: none; padding: 20px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.4); }
        .day-group.active .day-content { display: block; }

        .msg-preview { background: #0b141a; color: #e9edef; padding: 20px; border-radius: 15px; font-family: monospace; white-space: pre-wrap; border: 1px dashed var(--whatsapp); }
    </style>
</head>
<body>

<div id="custom-cursor"></div>

<div class="container">
    <div class="access-bar">
        <a href="#" class="access-link">🔑 MODO ADMINISTRADOR (PATRICK)</a>
        <a href="#" class="access-link">👁️ MODO VISITANTE (APENAS LEITURA)</a>
    </div>

    <header>
        <div class="logo-box">
            <img src="logo-resgate.png" class="logo-img" alt="Logo" onerror="this.src='https://via.placeholder.com/300x150/1e293b/e11d48?text=RESGATE+116'">
            <div class="dev-info">
                <h1>RESGATE 116</h1>
                <span class="dev-tag">SISTEMA DEV: PATRICK ALMEIDA</span>
            </div>
        </div>
        <div style="display: flex; gap: 15px;">
            <button class="btn" style="background:var(--border); width:auto; font-size:0.7rem;" onclick="exportData()">EXPORTAR BACKUP</button>
            <button class="btn" style="background:var(--border); width:auto; font-size:0.7rem;" onclick="document.getElementById('import-file').click()">IMPORTAR BACKUP</button>
            <input type="file" id="import-file" style="display:none;" onchange="importData(event)">
            <button class="btn btn-primary" style="width:auto; padding: 0 30px;" onclick="fetchEntries()">SINCRONIZAR</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card destaque-entrada"><h3>PREVISTO HOJE</h3><div class="value" id="stat-hoje">R$ 0,00</div></div>
        <div class="stat-card destaque-entrada"><h3>RESTANTE DO MÊS</h3><div class="value" id="stat-restante">R$ 0,00</div></div>
        <div class="stat-card"><h3>LIQUIDADOS</h3><div class="value" id="stat-liquidados" style="color:white">R$ 0,00</div></div>
        <div class="stat-card"><h3>TOTAL BRUTO</h3><div class="value" id="stat-total" style="color:var(--primary)">R$ 0,00</div></div>
    </div>

    <div class="dashboard-grid">
        <div class="left-column">
            <div class="card">
                <form id="entry-form">
                    <input type="hidden" id="edit-id">
                    <input type="date" id="input-date" required style="width:100%; padding:12px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--border); border-radius:8px;">
                    <input type="text" id="input-seguradora" placeholder="SEGURADORA" required style="width:100%; padding:12px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--border); border-radius:8px;">
                    <input type="text" id="input-value" placeholder="VALOR R$ 0,00" required style="width:100%; padding:12px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--border); border-radius:8px;">
                    <input type="text" id="input-desc" placeholder="OBSERVAÇÃO" style="width:100%; padding:12px; margin-bottom:15px; background:#000; color:#fff; border:1px solid var(--border); border-radius:8px;">
                    <button type="submit" class="btn btn-primary">SALVAR LANÇAMENTO</button>
                </form>
            </div>
            <div class="card" style="height:250px"><canvas id="pieChart"></canvas></div>
        </div>

        <div class="center-column">
            <div id="list-container"></div>
        </div>

        <div class="right-column">
            <div class="card">
                <div id="msg-preview" class="msg-preview">Carregando...</div>
                <button class="btn btn-whatsapp" onclick="sendWhatsApp()">🚀 ENVIAR PARA O WHATSAPP</button>
            </div>
        </div>
    </div>
</div>

<script>
    // EFEITO DO MOUSE
    const cursor = document.getElementById('custom-cursor');
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    const SUPABASE_URL = 'https://glmyblygbvhpluwncbtm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsbXlibHlnYnZocGx1d25jYnRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDY2MTQsImV4cCI6MjA5MTEyMjYxNH0.PqdwEYVYXIvOh2pYqQwaq8eyf2ZWS6BalQzOpINrXts';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let entries = [];
    let openDays = {};

    async function fetchEntries() {
        const { data } = await _supabase.from('entries').select('*').order('date', { ascending: true });
        entries = data || [];
        render();
    }

    function render() {
        const hoje = new Date().toISOString().split('T')[0];
        const mesAtual = new Date().getMonth();
        let sHoje = 0, sRestante = 0, sLiq = 0, sTotal = 0;
        let segTotals = {};

        entries.forEach(e => {
            const d = new Date(e.date + 'T12:00:00');
            if (d.getMonth() === mesAtual) {
                sTotal += e.value;
                if (e.date >= hoje) sRestante += e.value;
                else sLiq += e.value;
            }
            if (e.date === hoje) sHoje += e.value;
            segTotals[e.seguradora] = (segTotals[e.seguradora] || 0) + e.value;
        });

        document.getElementById('stat-hoje').innerText = formatCurrency(sHoje);
        document.getElementById('stat-restante').innerText = formatCurrency(sRestante);
        document.getElementById('stat-liquidados').innerText = formatCurrency(sLiq);
        document.getElementById('stat-total').innerText = formatCurrency(sTotal);

        const groups = entries.filter(e => e.date >= hoje).reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});
        const cont = document.getElementById('list-container');
        cont.innerHTML = '';
        
        Object.keys(groups).forEach(date => {
            const totalDia = groups[date].reduce((s, x) => s + x.value, 0);
            const div = document.createElement('div');
            div.className = `day-group ${openDays[date] ? 'active' : ''}`;
            div.innerHTML = `
                <div class="day-header" onclick="toggleDay('${date}')">
                    <span>📅 <b>${date.split('-').reverse().slice(0,2).join('/')}</b></span>
                    <span style="color:var(--success); font-weight:900;">${formatCurrency(totalDia)}</span>
                </div>
                <div class="day-content">
                    ${groups[date].map(e => `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05)">
                        <span>${e.seguradora}</span>
                        <b>${formatCurrency(e.value)}</b>
                    </div>`).join('')}
                </div>`;
            cont.appendChild(div);
        });

        updateWhatsapp(hoje);
        // Chart
        const ctx = document.getElementById('pieChart').getContext('2d');
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: Object.keys(segTotals), datasets: [{ data: Object.values(segTotals), backgroundColor: ['#e11d48', '#10b981', '#3b82f6', '#facc15'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function toggleDay(date) { openDays[date] = !openDays[date]; render(); }
    function formatCurrency(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function updateWhatsapp(hoje) {
        let msg = "*PREVISÃO DE CRÉDITOS - RESGATE 116*\n\n";
        const proximos = entries.filter(e => e.date >= hoje).sort((a,b) => a.date.localeCompare(b.date));
        const groups = proximos.reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});
        Object.keys(groups).slice(0,5).forEach(date => {
            const total = groups[date].reduce((s, x) => s + x.value, 0);
            msg += `${date.split('-').reverse().slice(0,2).join('/')}: *${formatCurrency(total)}*\n`;
        });
        document.getElementById('msg-preview').innerText = msg;
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(entries));
        const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "backup.json"); dl.click();
    }

    async function importData(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = JSON.parse(e.target.result);
            for (const item of data) { delete item.id; await _supabase.from('entries').insert([item]); }
            fetchEntries();
        };
        reader.readAsText(file);
    }

    document.getElementById('entry-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const val = parseFloat(document.getElementById('input-value').value.replace(/\./g, '').replace(',', '.'));
        const entry = {
            date: document.getElementById('input-date').value,
            seguradora: document.getElementById('input-seguradora').value.toUpperCase(),
            value: val,
            desc: document.getElementById('input-desc').value.toUpperCase()
        };
        await _supabase.from('entries').insert([entry]);
        fetchEntries();
    });

    document.getElementById('input-value').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        v = (v / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        e.target.value = v;
    });

    fetchEntries();
</script>
</body>
</html>
