<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro - Resgate 116</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #e11d48; --success: #10b981; --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); 
            --text-main: #f8fafc; --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
        }
        [data-theme="light"] {
            --bg: #f8fafc; --card-bg: rgba(255, 255, 255, 0.8); --text-main: #0f172a; 
            --text-muted: #64748b; --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            padding: 20px; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background-image: radial-gradient(circle at 50% -20%, rgba(225, 29, 72, 0.15), transparent 40%);
            min-height: 100vh;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        /* Estilo Tecnológico dos Cards */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px -10px rgba(225, 29, 72, 0.3);
        }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 30px; margin-bottom: 30px;
        }

        .logo-area { display: flex; align-items: center; gap: 20px; }
        .logo-img { height: 55px; filter: drop-shadow(0 0 8px rgba(225, 29, 72, 0.3)); transition: 0.5s; }
        .logo-img:hover { transform: scale(1.05) rotate(-2deg); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { padding: 25px; position: relative; overflow: hidden; }
        .stat-card::after { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); }
        .stat-card.previsao::after { background: var(--success); }
        
        .stat-card h3 { font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
        .stat-card .value { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }

        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr 350px; gap: 25px; }

        /* Lista de Créditos Estilizada */
        .day-group { margin-bottom: 12px; transition: 0.3s; }
        .day-header { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; border-radius: 12px; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
        }
        .day-header:active { transform: scale(0.98); }
        .day-header:hover { background: rgba(225, 29, 72, 0.05); border-color: var(--primary); }

        .btn { 
            padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; 
            transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(225, 29, 72, 0.4); }
        .btn-primary:hover { transform: scale(1.02); filter: brightness(1.1); }
        
        input { 
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; 
            background: rgba(0,0,0,0.2); color: white; margin-bottom: 15px; outline: none;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(225, 29, 72, 0.2); }

        .tab { 
            flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 0.8rem; font-weight: 800;
            border-radius: 8px; transition: 0.3s; color: var(--text-muted);
        }
        .tab.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(225, 29, 72, 0.3); }

        #msg-preview { 
            font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--success);
            padding: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px solid var(--border);
        }

        /* Animação de entrada */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .stat-card, .day-group, .card { animation: fadeIn 0.5s ease forwards; }

    </style>
</head>
<body data-theme="dark">

<div class="container">
    <header class="glass-card">
        <div class="logo-area">
            <img src="logo-resgate.png" class="logo-img" alt="Logo" onerror="this.src='https://via.placeholder.com/150x50?text=RESGATE+116'">
            <div class="brand-info">
                <h1 style="letter-spacing: -1px;">GRUPO <span style="color:var(--text-main)">RESGATE 116</span></h1>
                <p style="text-transform: uppercase; font-weight: 700; font-size: 0.6rem; letter-spacing: 2px;">Finance System v2.0</p>
                <div style="font-size: 0.6rem; color: var(--text-muted); margin-top: 4px;">Dev by Patrick Almeida</div>
            </div>
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="btn glass-card" onclick="toggleTheme()" style="width: 45px; padding: 0;">🌓</button>
            <button class="btn glass-card" onclick="fetchEntries()" style="width: 45px; padding: 0;">🔄</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card glass-card previsao"><h3>Previsto Hoje</h3><div class="value" id="stat-hoje" style="color: var(--success)">R$ 0,00</div></div>
        <div class="stat-card glass-card previsao"><h3>Restante do Mês</h3><div class="value" id="stat-restante-mes">R$ 0,00</div></div>
        <div class="stat-card glass-card"><h3>Acumulado Mês</h3><div class="value" id="stat-total-mes">R$ 0,00</div></div>
        <div class="stat-card glass-card" style="opacity: 0.7;"><h3>Volume Geral</h3><div class="value" id="stat-bruto">R$ 0,00</div></div>
    </div>

    <div class="dashboard-grid">
        <div class="left-column">
            <div class="card glass-card admin-only" style="padding: 25px;">
                <h4 style="margin-bottom:20px; font-size:0.75rem; letter-spacing: 1px;">NOVO AGENDAMENTO</h4>
                <form id="entry-form">
                    <input type="date" id="input-date" required>
                    <input type="text" id="input-seguradora" placeholder="SEGURADORA" required>
                    <input type="text" id="input-value" placeholder="VALOR R$ 0,00" required>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">REGISTRAR CRÉDITO</button>
                </form>
            </div>
            <div class="card glass-card" style="padding: 20px;">
                <h4 style="margin-bottom:15px; font-size:0.75rem;">CONCENTRAÇÃO</h4>
                <canvas id="pieChart" height="220"></canvas>
            </div>
        </div>

        <div class="center-column">
            <div class="glass-card" style="display: flex; gap: 5px; padding: 6px; margin-bottom: 20px;">
                <div class="tab active" onclick="switchTab('proximos')" id="tab-proximos">PRÓXIMOS CRÉDITOS</div>
                <div class="tab" onclick="switchTab('historico')" id="tab-historico">HISTÓRICO</div>
            </div>
            <div id="list-container"></div>
        </div>

        <div class="right-column">
            <div class="card glass-card">
                <h4 style="margin-bottom:15px; font-size:0.75rem;">AUTOMAÇÃO WHATSAPP</h4>
                <div id="msg-preview">Carregando dados...</div>
                <button class="btn" onclick="sendWhatsApp()" style="background: #238636; color: white; width: 100%; margin-top: 15px;">
                    ENVIAR PARA O GRUPO
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://glmyblygbvhpluwncbtm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsbXlibHlnYnZocGx1d25jYnRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDY2MTQsImV4cCI6MjA5MTEyMjYxNH0.PqdwEYVYXIvOh2pYqQwaq8eyf2ZWS6BalQzOpINrXts';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let entries = [];
    let currentTab = 'proximos';

    async function fetchEntries() {
        const { data } = await _supabase.from('entries').select('*').order('date', { ascending: true });
        entries = data || [];
        render();
    }

    function render() {
        const hoje = new Date().toISOString().split('T')[0];
        const agora = new Date();
        const mesAtual = agora.getMonth();
        const anoAtual = agora.getFullYear();

        let somaHoje = 0, somaRestanteMes = 0, somaTotalMes = 0, somaBruto = 0;
        let semanaValores = {};

        entries.forEach(e => {
            const d = new Date(e.date + 'T12:00:00');
            somaBruto += e.value;
            if (d.getMonth() === mesAtual && d.getFullYear() === anoAtual) {
                somaTotalMes += e.value;
                if (e.date >= hoje) somaRestanteMes += e.value;
            }
            if (e.date === hoje) somaHoje += e.value;
            semanaValores[e.date] = (semanaValores[e.date] || 0) + e.value;
        });

        document.getElementById('stat-hoje').innerText = formatCurrency(somaHoje);
        document.getElementById('stat-restante-mes').innerText = formatCurrency(somaRestanteMes);
        document.getElementById('stat-total-mes').innerText = formatCurrency(somaTotalMes);
        document.getElementById('stat-bruto').innerText = formatCurrency(somaBruto);

        const filtered = entries.filter(e => currentTab === 'proximos' ? e.date >= hoje : e.date < hoje);
        const groups = filtered.reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});

        const listCont = document.getElementById('list-container');
        listCont.innerHTML = '';
        Object.keys(groups).sort((a,b) => currentTab === 'proximos' ? a.localeCompare(b) : b.localeCompare(a)).forEach(date => {
            const totalDia = groups[date].reduce((s, x) => s + x.value, 0);
            const isToday = date === hoje;
            const div = document.createElement('div');
            div.className = 'day-group';
            div.innerHTML = `
                <div class="day-header" onclick="this.parentElement.classList.toggle('active')" style="${isToday ? 'border-left: 3px solid var(--success)' : ''}">
                    <span style="font-size:0.85rem"><b>${date.split('-').reverse().slice(0,2).join('/')}</b> ${isToday ? '• <small>HOJE</small>' : ''}</span>
                    <span style="color:var(--success); font-weight:800">${formatCurrency(totalDia)}</span>
                </div>
                <div class="day-content" style="display:none; padding:15px; background:rgba(0,0,0,0.1); border-radius:0 0 12px 12px;">
                    ${groups[date].map(e => `<div style="display:flex;justify-content:space-between;font-size:0.75rem;padding:6px 0;border-bottom:1px solid var(--border)"><span>${e.seguradora}</span><b>${formatCurrency(e.value)}</b></div>`).join('')}
                </div>`;
            listCont.appendChild(div);
        });

        updateWhatsapp(semanaValores);
    }

    function updateWhatsapp(valores) {
        let msg = "📊 *PROGRAMAÇÕES DA SEMANA*\n\n";
        const diasSemana = ["Dom", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sáb"];
        Object.keys(valores).sort().filter(d => d >= new Date().toISOString().split('T')[0]).slice(0,5).forEach(date => {
            const d = new Date(date + 'T12:00:00');
            msg += `📅 ${date.split('-').reverse().slice(0,2).join('/')} ${diasSemana[d.getDay()]} - *${formatCurrency(valores[date])}*\n`;
        });
        document.getElementById('msg-preview').innerText = msg;
    }

    function formatCurrency(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
    
    function toggleTheme() { 
        const b = document.body; 
        const isDark = b.getAttribute('data-theme') === 'dark';
        b.setAttribute('data-theme', isDark ? 'light' : 'dark'); 
    }

    function switchTab(t) { 
        currentTab = t; 
        document.getElementById('tab-proximos').classList.toggle('active', t==='proximos'); 
        document.getElementById('tab-historico').classList.toggle('active', t==='historico'); 
        render(); 
    }

    function sendWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent(document.getElementById('msg-preview').innerText)}`, '_blank'); }

    if (new URLSearchParams(window.location.search).get('admin') === 'true') {
        if (prompt("Senha Admin:") === "Murrilho123*") { document.body.classList.add('is-admin'); }
    }

    document.getElementById('input-value').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        e.target.value = (v/100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
    });

    document.getElementById('entry-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const val = parseFloat(document.getElementById('input-value').value.replace(/\D/g, '')) / 100;
        await _supabase.from('entries').insert([{
            date: document.getElementById('input-date').value,
            seguradora: document.getElementById('input-seguradora').value.toUpperCase(),
            value: val
        }]);
        fetchEntries();
    });

    fetchEntries();
</script>
</body>
</html>
