<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro - Grupo Resgate 116</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #e11d48; --success: #10b981; --whatsapp: #25d366; 
            --bg: #0b0e14; --card-bg: rgba(30, 41, 59, 0.8); --text-main: #f8fafc;
            --border: rgba(51, 65, 85, 0.9); --highlight-yellow: #facc15;
        }

        /* FUNDO COM TEXTURA E ESTILO */
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 32px 32px;
            color: var(--text-main); font-family: 'Inter', sans-serif; padding: 20px; 
        }

        /* FORÇANDO EFEITO DO CURSOR EM TUDO QUE É INTERATIVO */
        button, .clickable, .day-header, .tab, .action-icons span, input, select, .logo-img { 
            cursor: pointer !important; 
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; padding: 20px; background: var(--card-bg); 
            border-radius: 20px; border: 1px solid var(--border); backdrop-filter: blur(10px);
        }

        /* STATS COM DESTAQUE VERDE E CÍRCULO AMARELO */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--border); transition: 0.3s; }
        
        .destaque-entrada { 
            background: rgba(16, 185, 129, 0.15) !important;
            border: 3px solid var(--highlight-yellow) !important; /* Círculo/Borda Amarela */
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.3);
            transform: scale(1.05);
        }
        .destaque-entrada h3 { color: var(--highlight-yellow) !important; font-weight: 900; }
        .destaque-entrada .value { color: var(--success); font-size: 2rem; }

        .stat-card h3 { font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 5px; }
        .stat-card .value { font-size: 1.6rem; font-weight: 900; }

        /* GRID PRINCIPAL */
        .dashboard-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 25px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 20px; }
        .card-title { font-size: 0.8rem; font-weight: 800; margin-bottom: 15px; color: var(--primary); text-transform: uppercase; }

        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: #0f172a; color: white; margin-bottom: 12px; outline: none; }
        
        /* EFEITO DE CLIQUE NOS BOTÕES */
        .btn { padding: 14px; border-radius: 10px; font-weight: 700; border: none; width: 100%; transition: 0.1s; color: white; }
        .btn:active { transform: translateY(2px) scale(0.98); }
        .btn-primary { background: var(--primary); }
        .btn-whatsapp { background: var(--whatsapp); margin-top: 10px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); }

        /* SANFONA / ACORDEÃO */
        .day-group { margin-bottom: 10px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .day-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(30, 41, 59, 0.4); }
        .day-header:hover { background: rgba(255,255,255,0.05); }
        .day-content { display: none; padding: 15px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        .day-group.active .day-content { display: block; }
        .day-total { color: var(--success); font-weight: 800; font-size: 1.2rem; }

        .entry-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .msg-preview { background: #0b141a; color: #e9edef; padding: 15px; border-radius: 12px; font-family: monospace; white-space: pre-wrap; font-size: 0.85rem; border: 1px dashed var(--border); }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 12px; background: var(--border); border-radius: 10px; font-size: 0.75rem; font-weight: 800; color: #94a3b8; }
        .tab.active { background: var(--primary); color: white; }
        
        footer { text-align: center; margin-top: 40px; color: #475569; font-size: 0.8rem; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="logo-resgate.png" class="logo-img" style="height: 60px;" alt="Logo" onerror="this.src='https://via.placeholder.com/150x60?text=RESGATE+116'">
            <div>
                <h1 style="color:var(--primary); font-weight:900;">GRUPO RESGATE 116</h1>
                <p style="font-size:0.7rem; color:#94a3b8;">SISTEMA FINANCEIRO</p>
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" style="width:auto;" onclick="exportData()">📥 Exportar Backup</button>
            <button class="btn btn-outline" style="width:auto;" onclick="document.getElementById('import-file').click()">📤 Importar Backup</button>
            <input type="file" id="import-file" style="display:none;" onchange="importData(event)">
            <button class="btn btn-primary" style="width:auto;" onclick="fetchEntries()">🔄 Sincronizar</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card destaque-entrada"><h3>Previsto Hoje</h3><div class="value" id="stat-hoje">R$ 0,00</div></div>
        <div class="stat-card destaque-entrada"><h3>Restante do Mês</h3><div class="value" id="stat-restante">R$ 0,00</div></div>
        <div class="stat-card"><h3>Já Liquidados</h3><div class="value" id="stat-liquidados">R$ 0,00</div></div>
        <div class="stat-card"><h3>Total Bruto</h3><div class="value" id="stat-total">R$ 0,00</div></div>
    </div>

    <div class="dashboard-grid">
        <div class="left-column">
            <div class="card">
                <div class="card-title">➕ Novo Lançamento</div>
                <form id="entry-form">
                    <input type="hidden" id="edit-id">
                    <input type="date" id="input-date" required>
                    <input type="text" id="input-seguradora" placeholder="Seguradora" required>
                    <input type="text" id="input-value" placeholder="Valor 0,00" required>
                    <input type="text" id="input-desc" placeholder="NF / Detalhes">
                    <button type="submit" id="btn-submit" class="btn btn-primary">SALVAR NO BANCO</button>
                </form>
            </div>
            <div class="card"><div class="card-title">📊 Divisão</div><div style="height:180px"><canvas id="pieChart"></canvas></div></div>
        </div>

        <div class="center-column">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('proximos')" id="tab-proximos">PROGRAMADOS</div>
                <div class="tab" onclick="switchTab('historico')" id="tab-historico">PAGOS</div>
            </div>
            <div id="list-container"></div>
        </div>

        <div class="right-column">
            <div class="card">
                <div class="card-title">📱 Resumo WhatsApp</div>
                <div id="msg-preview" class="msg-preview">Carregando...</div>
                <button class="btn btn-whatsapp" onclick="sendWhatsApp()">🚀 ENVIAR AO GRUPO</button>
                <button class="btn btn-outline" style="margin-top:8px" onclick="copyToClipboard()">📋 COPIAR TEXTO</button>
            </div>
        </div>
    </div>
    <footer>Criado por Patrick de Almeida</footer>
</div>

<script>
    const SUPABASE_URL = 'https://glmyblygbvhpluwncbtm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsbXlibHlnYnZocGx1d25jYnRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDY2MTQsImV4cCI6MjA5MTEyMjYxNH0.PqdwEYVYXIvOh2pYqQwaq8eyf2ZWS6BalQzOpINrXts';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let entries = [];
    let currentTab = 'proximos';
    let openDays = {};

    async function fetchEntries() {
        const { data, error } = await _supabase.from('entries').select('*').order('date', { ascending: true });
        if (!error) { entries = data; render(); }
    }

    function render() {
        const hoje = new Date().toISOString().split('T')[0];
        const mesAtual = new Date().getMonth();
        let sHoje = 0, sRestante = 0, sLiq = 0, sTotal = 0;
        let segTotals = {};

        entries.forEach(e => {
            const d = new Date(e.date + 'T12:00:00');
            if (d.getMonth() === mesAtual) {
                sTotal += e.value;
                if (e.date >= hoje) sRestante += e.value;
                else sLiq += e.value;
            }
            if (e.date === hoje) sHoje += e.value;
            segTotals[e.seguradora] = (segTotals[e.seguradora] || 0) + e.value;
        });

        document.getElementById('stat-hoje').innerText = formatCurrency(sHoje);
        document.getElementById('stat-restante').innerText = formatCurrency(sRestante);
        document.getElementById('stat-liquidados').innerText = formatCurrency(sLiq);
        document.getElementById('stat-total').innerText = formatCurrency(sTotal);

        const filtered = entries.filter(e => currentTab === 'proximos' ? e.date >= hoje : e.date < hoje);
        const groups = filtered.reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});

        const cont = document.getElementById('list-container');
        cont.innerHTML = '';
        
        Object.keys(groups).sort((a,b) => currentTab === 'proximos' ? a.localeCompare(b) : b.localeCompare(a)).forEach(date => {
            const totalDia = groups[date].reduce((s, x) => s + x.value, 0);
            const div = document.createElement('div');
            div.className = `day-group ${openDays[date] ? 'active' : ''}`;
            div.innerHTML = `
                <div class="day-header" onclick="toggleDay('${date}')">
                    <span>📅 <b>${date.split('-').reverse().slice(0,2).join('/')}</b></span>
                    <span class="day-total">${formatCurrency(totalDia)}</span>
                </div>
                <div class="day-content">
                    ${groups[date].map(e => `
                        <div class="entry-row">
                            <span><b>${e.seguradora}</b> <small style="color:#64748b">${e.desc || ''}</small></span>
                            <div class="action-icons">
                                <b>${formatCurrency(e.value)}</b>
                                <span onclick="editEntry(${e.id})">✏️</span>
                                <span onclick="deleteEntry(${e.id})">🗑️</span>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            cont.appendChild(div);
        });

        updateWhatsapp(hoje);
        // Atualizar Gráfico Pie
        const ctx = document.getElementById('pieChart').getContext('2d');
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: Object.keys(segTotals), datasets: [{ data: Object.values(segTotals), backgroundColor: ['#e11d48', '#10b981', '#3b82f6', '#facc15', '#8b5cf6'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '70%' }
        });
    }

    function toggleDay(date) { openDays[date] = !openDays[date]; render(); }

    function updateWhatsapp(hoje) {
        let msg = "*Previsões de crédito para a semana:*\n\n";
        const proximos = entries.filter(e => e.date >= hoje).sort((a,b) => a.date.localeCompare(b.date));
        const groups = proximos.reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});
        const diasSemana = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];

        Object.keys(groups).slice(0,7).forEach(date => {
            const dataObj = new Date(date + 'T12:00:00');
            const dataFmt = date.split('-').reverse().slice(0,2).join('/');
            const diaNome = diasSemana[dataObj.getDay()];
            const totalDia = groups[date].reduce((s, x) => s + x.value, 0);
            msg += `${dataFmt} ${diaNome}: *${formatCurrency(totalDia)}*\n\n`;
        });
        document.getElementById('msg-preview').innerText = msg;
    }

    // FUNÇÕES DE BACKUP (IMPORTAR / EXPORTAR)
    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(entries));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "backup_financeiro_resgate.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    async function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if(confirm(`Importar ${data.length} lançamentos? Isso pode duplicar dados se já existirem.`)) {
                    for (const item of data) {
                        delete item.id; // Remove o ID antigo para o Supabase gerar um novo
                        await _supabase.from('entries').insert([item]);
                    }
                    alert("Backup importado com sucesso!");
                    fetchEntries();
                }
            } catch (err) { alert("Erro ao ler o arquivo."); }
        };
        reader.readAsText(file);
    }

    // CRUD E UTILITÁRIOS
    document.getElementById('entry-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const val = parseFloat(document.getElementById('input-value').value.replace(/\./g, '').replace(',', '.'));
        const entry = {
            date: document.getElementById('input-date').value,
            seguradora: document.getElementById('input-seguradora').value.toUpperCase(),
            value: val,
            desc: document.getElementById('input-desc').value.toUpperCase()
        };
        if (id) await _supabase.from('entries').update(entry).eq('id', id);
        else await _supabase.from('entries').insert([entry]);
        document.getElementById('entry-form').reset();
        document.getElementById('edit-id').value = '';
        fetchEntries();
    });

    function editEntry(id) {
        const e = entries.find(x => x.id == id);
        document.getElementById('edit-id').value = e.id;
        document.getElementById('input-date').value = e.date;
        document.getElementById('input-seguradora').value = e.seguradora;
        document.getElementById('input-value').value = e.value.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        document.getElementById('input-desc').value = e.desc || '';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function deleteEntry(id) {
        if(confirm('Excluir?')) { await _supabase.from('entries').delete().eq('id', id); fetchEntries(); }
    }

    function formatCurrency(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
    function switchTab(t) { currentTab = t; render(); }
    function copyToClipboard() { navigator.clipboard.writeText(document.getElementById('msg-preview').innerText).then(() => alert("Copiado!")); }
    function sendWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent(document.getElementById('msg-preview').innerText)}`, '_blank'); }

    document.getElementById('input-value').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        v = (v / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        e.target.value = v;
    });

    document.getElementById('input-date').valueAsDate = new Date();
    fetchEntries();
</script>
</body>
</html>
