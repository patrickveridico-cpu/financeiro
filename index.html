<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro - Resgate 116</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2454/2454282.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #e11d48; --success: #10b981; --bg: #0b0e14; --card-bg: rgba(22, 27, 34, 0.7); 
            --text-main: #f0f6fc; --text-muted: #8b949e; --border: rgba(48, 54, 61, 0.8);
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --card-bg: rgba(255, 255, 255, 0.9); --text-main: #0f172a; 
            --text-muted: #64748b; --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 20px; min-height: 100vh; }

        .container { max-width: 1400px; margin: 0 auto; position: relative; }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; }
        .brand-info h1 { font-size: 1.1rem; color: var(--primary); }
        .brand-info p { font-size: 0.65rem; color: var(--text-muted); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { padding: 20px; border-left: 4px solid var(--primary); }
        .stat-card .value { font-size: 1.4rem; font-weight: 800; }

        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; }
        
        .day-group { margin-bottom: 8px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--card-bg); }
        .day-header { display: flex; justify-content: space-between; padding: 12px 15px; cursor: pointer; }
        .day-content { display: none; padding: 10px 15px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        .day-group.active .day-content { display: block; }

        .entry-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
        .actions { display: flex; gap: 10px; }
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 1rem; }

        input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: rgba(0,0,0,0.4); color: white; margin-bottom: 10px; font-size: 0.85rem; }
        label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 4px; }
        
        .btn { padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; width: 100%; font-size: 0.85rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: none; border: 1px solid var(--border); color: var(--text-main); margin-top: 5px; }
        .btn-whatsapp { background: #238636; color: white; margin-top: 10px; }

        .chart-container { height: 220px; width: 100%; }
        .msg-preview { font-family: monospace; font-size: 0.75rem; color: var(--success); padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px; white-space: pre-wrap; margin-bottom: 10px; }
        
        .tabs { display: flex; gap: 5px; padding: 5px; margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 8px; cursor: pointer; font-weight: 800; font-size: 0.7rem; border-radius: 8px; color: var(--text-muted); }
        .tab.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <header class="glass-card">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="logo-resgate.png" height="45" alt="Logo" onerror="this.src='https://via.placeholder.com/150x50?text=RESGATE+116'">
            <div class="brand-info">
                <h1>GRUPO RESGATE 116</h1>
                <p>Site criado por Patrick Almeida</p>
            </div>
        </div>
        <div style="display: flex; gap: 8px;">
            <button class="btn-icon" onclick="exportData()" title="Backup">📥</button>
            <button class="btn-icon" onclick="importData()" title="Importar">📤</button>
            <button class="btn-icon" onclick="fetchEntries()">🔄</button>
            <button class="btn-icon" onclick="toggleTheme()">🌓</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card glass-card"><h3>Previsto Hoje</h3><div class="value" id="stat-hoje" style="color: var(--success)">R$ 0,00</div></div>
        <div class="stat-card glass-card"><h3>Restante do Mês</h3><div class="value" id="stat-restante-mes">R$ 0,00</div></div>
        <div class="stat-card glass-card"><h3>Já Liquidados</h3><div class="value" id="stat-liquidados">R$ 0,00</div></div>
        <div class="stat-card glass-card"><h3>Total Programado</h3><div class="value" id="stat-total-mes">R$ 0,00</div></div>
    </div>

    <div class="dashboard-grid">
        <div class="left-column">
            <div class="glass-card" style="padding: 20px;">
                <h4 style="font-size:0.7rem; margin-bottom:15px; color: var(--primary)">➕ NOVO LANÇAMENTO</h4>
                <form id="entry-form">
                    <input type="hidden" id="edit-id">
                    <label>Data</label>
                    <input type="date" id="input-date" required>
                    <label>Seguradora</label>
                    <input type="text" id="input-seguradora" placeholder="Ex: PORTO, TOKIO" required>
                    <label>Valor (R$)</label>
                    <input type="text" id="input-value" placeholder="0,00" required>
                    <label>Nota Fiscal / Obs</label>
                    <input type="text" id="input-desc" placeholder="NF-000">
                    <button type="submit" id="btn-submit" class="btn btn-primary">AGENDAR ENTRADA</button>
                    <button type="button" id="btn-cancel" class="btn btn-outline" style="display:none" onclick="resetForm()">CANCELAR EDIÇÃO</button>
                </form>
            </div>
            <div class="glass-card" style="padding: 20px;">
                <h4 style="font-size:0.7rem; margin-bottom:15px">CONCENTRAÇÃO</h4>
                <div class="chart-container"><canvas id="pieChart"></canvas></div>
            </div>
        </div>

        <div class="center-column">
            <div class="glass-card tabs">
                <div class="tab active" onclick="switchTab('proximos')" id="tab-proximos">PRÓXIMOS CRÉDITOS</div>
                <div class="tab" onclick="switchTab('historico')" id="tab-historico">HISTÓRICO</div>
            </div>
            <div id="list-container"></div>
        </div>

        <div class="right-column">
            <div class="glass-card" style="padding: 20px;">
                <h4 style="font-size:0.7rem; margin-bottom:15px">EVOLUÇÃO DIÁRIA</h4>
                <div class="chart-container"><canvas id="barChart"></canvas></div>
            </div>
            <div class="glass-card" style="padding: 20px;">
                <h4 style="font-size:0.7rem; margin-bottom:15px">RESUMO WHATSAPP</h4>
                <div id="msg-preview" class="msg-preview">Aguardando dados...</div>
                <button class="btn btn-outline" onclick="copyToClipboard()">📋 COPIAR TEXTO</button>
                <button class="btn btn-whatsapp" onclick="sendWhatsApp()">🚀 ENVIAR GRUPO</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://glmyblygbvhpluwncbtm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsbXlibHlnYnZocGx1d25jYnRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDY2MTQsImV4cCI6MjA5MTEyMjYxNH0.PqdwEYVYXIvOh2pYqQwaq8eyf2ZWS6BalQzOpINrXts';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let entries = [];
    let currentTab = 'proximos';
    let pieChart, barChart;

    async function fetchEntries() {
        const { data, error } = await _supabase.from('entries').select('*').order('date', { ascending: true });
        if (!error) { entries = data; render(); }
    }

    document.getElementById('entry-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const val = parseFloat(document.getElementById('input-value').value.replace(/\./g, '').replace(',', '.'));
        const data = {
            date: document.getElementById('input-date').value,
            seguradora: document.getElementById('input-seguradora').value.toUpperCase(),
            value: val,
            desc: document.getElementById('input-desc').value
        };

        if (id) await _supabase.from('entries').update(data).eq('id', id);
        else await _supabase.from('entries').insert([data]);
        
        resetForm();
        fetchEntries();
    });

    function render() {
        const hoje = new Date().toISOString().split('T')[0];
        const mesAtual = new Date().getMonth();
        let sHoje = 0, sRestante = 0, sLiq = 0, sTotal = 0;
        let segTotals = {}, dailyTotals = {};

        entries.forEach(e => {
            const d = new Date(e.date + 'T12:00:00');
            if (d.getMonth() === mesAtual) {
                sTotal += e.value;
                if (e.date >= hoje) sRestante += e.value;
                else sLiq += e.value;
            }
            if (e.date === hoje) sHoje += e.value;
            segTotals[e.seguradora] = (segTotals[e.seguradora] || 0) + e.value;
            dailyTotals[e.date] = (dailyTotals[e.date] || 0) + e.value;
        });

        document.getElementById('stat-hoje').innerText = formatCurrency(sHoje);
        document.getElementById('stat-restante-mes').innerText = formatCurrency(sRestante);
        document.getElementById('stat-liquidados').innerText = formatCurrency(sLiq);
        document.getElementById('stat-total-mes').innerText = formatCurrency(sTotal);

        const filtered = entries.filter(e => currentTab === 'proximos' ? e.date >= hoje : e.date < hoje);
        const groups = filtered.reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});

        const cont = document.getElementById('list-container');
        cont.innerHTML = '';
        Object.keys(groups).sort((a,b) => currentTab === 'proximos' ? a.localeCompare(b) : b.localeCompare(a)).forEach(date => {
            const totalDia = groups[date].reduce((s, x) => s + x.value, 0);
            const div = document.createElement('div');
            div.className = 'day-group active';
            div.innerHTML = `
                <div class="day-header" onclick="this.parentElement.classList.toggle('active')">
                    <span><b>${date.split('-').reverse().slice(0,2).join('/')}</b></span>
                    <span style="color:var(--success); font-weight:800">${formatCurrency(totalDia)}</span>
                </div>
                <div class="day-content">
                    ${groups[date].map(e => `
                        <div class="entry-row">
                            <span><b>${e.seguradora}</b> ${e.desc ? '- ' + e.desc : ''}</span>
                            <div class="actions">
                                <span>${formatCurrency(e.value)}</span>
                                <button class="btn-icon" onclick="editEntry(${e.id})">✏️</button>
                                <button class="btn-icon" onclick="deleteEntry(${e.id})">🗑️</button>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            cont.appendChild(div);
        });

        updateCharts(segTotals, dailyTotals);
        updateWhatsapp();
    }

    function editEntry(id) {
        const e = entries.find(x => x.id == id);
        document.getElementById('edit-id').value = e.id;
        document.getElementById('input-date').value = e.date;
        document.getElementById('input-seguradora').value = e.seguradora;
        document.getElementById('input-value').value = e.value.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        document.getElementById('input-desc').value = e.desc;
        document.getElementById('btn-submit').innerText = "SALVAR ALTERAÇÃO";
        document.getElementById('btn-cancel').style.display = "block";
        window.scrollTo(0,0);
    }

    async function deleteEntry(id) {
        if(confirm('Excluir este lançamento?')) {
            await _supabase.from('entries').delete().eq('id', id);
            fetchEntries();
        }
    }

    function resetForm() {
        document.getElementById('entry-form').reset();
        document.getElementById('edit-id').value = '';
        document.getElementById('btn-submit').innerText = "AGENDAR ENTRADA";
        document.getElementById('btn-cancel').style.display = "none";
        document.getElementById('input-date').valueAsDate = new Date();
    }

    function updateCharts(segData, dailyData) {
        if (pieChart) pieChart.destroy();
        pieChart = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: { labels: Object.keys(segData), datasets: [{ data: Object.values(segData), backgroundColor: ['#e11d48', '#10b981', '#3b82f6', '#f59e0b', '#8b5cf6'] }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        if (barChart) barChart.destroy();
        const lastDays = Object.keys(dailyData).sort().slice(-7);
        barChart = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: { labels: lastDays.map(d => d.split('-').reverse().slice(0,2).join('/')), datasets: [{ label: 'R$', data: lastDays.map(d => dailyData[d]), backgroundColor: '#e11d48' }] },
            options: { maintainAspectRatio: false, scales: { y: { display: false }, x: { ticks: { color: '#8b949e', font: { size: 9 } } } }, plugins: { legend: { display: false } } }
        });
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(entries)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup_financeiro.json'; a.click();
    }

    function importData() {
        const input = document.createElement('input'); input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = async re => {
                const data = JSON.parse(re.target.result);
                for (const item of data) { delete item.id; await _supabase.from('entries').insert([item]); }
                fetchEntries();
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    function updateWhatsapp() {
        let msg = "📊 *PREVISÃO RESGATE 116*\n\n";
        entries.filter(e => e.date >= new Date().toISOString().split('T')[0]).slice(0,6).forEach(e => {
            msg += `📅 ${e.date.split('-').reverse().slice(0,2).join('/')} - ${e.seguradora}: *${formatCurrency(e.value)}*\n`;
        });
        document.getElementById('msg-preview').innerText = msg;
    }

    function formatCurrency(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
    function switchTab(t) { currentTab = t; document.getElementById('tab-proximos').classList.toggle('active', t==='proximos'); document.getElementById('tab-historico').classList.toggle('active', t==='historico'); render(); }
    function copyToClipboard() { navigator.clipboard.writeText(document.getElementById('msg-preview').innerText).then(() => alert("Copiado!")); }
    function sendWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent(document.getElementById('msg-preview').innerText)}`, '_blank'); }

    document.getElementById('input-value').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        v = (v / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        e.target.value = v;
    });

    document.getElementById('input-date').valueAsDate = new Date();
    fetchEntries();
</script>
</body>
</html>
