<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro - Resgate 116</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2454/2454282.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #e11d48; --success: #10b981; --bg: #0b0e14; --card-bg: rgba(22, 27, 34, 0.7); 
            --text-main: #f0f6fc; --text-muted: #8b949e; --border: rgba(48, 54, 61, 0.8);
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --card-bg: rgba(255, 255, 255, 0.9); --text-main: #0f172a; 
            --text-muted: #64748b; --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 20px; min-height: 100vh; overflow-x: hidden; position: relative; }

        /* EFEITO DE FUNDO */
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(225, 29, 72, 0.12) 0%, transparent 50%); z-index: -1; pointer-events: none; }
        .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.05; z-index: -2; }

        .container { max-width: 1400px; margin: 0 auto; position: relative; }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 12px; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; margin-bottom: 25px; }
        .logo-img { height: 45px; cursor: pointer; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { padding: 20px; border-left: 4px solid var(--primary); }
        .stat-card.previsao { border-left-color: var(--success); }
        .stat-card .value { font-size: 1.4rem; font-weight: 800; }

        .dashboard-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; }
        
        .admin-only { display: none; }
        body.is-admin .admin-only { display: block; }

        /* LISTA */
        .day-group { margin-bottom: 8px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--card-bg); }
        .day-header { display: flex; justify-content: space-between; padding: 12px 15px; cursor: pointer; }
        .day-content { display: none; padding: 10px 15px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        .day-group.active .day-content { display: block; }

        /* INPUTS */
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: rgba(0,0,0,0.4); color: white; margin-bottom: 10px; color-scheme: dark; }
        .btn { padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn:hover { opacity: 0.8; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-whatsapp { background: #238636; color: white; width: 100%; margin-top: 10px; }
        .btn-copy { background: rgba(255,255,255,0.1); color: var(--text-main); width: 100%; margin-top: 15px; font-size: 0.7rem; border: 1px solid var(--border); }
        .btn-icon { width: 40px; height: 40px; padding: 0; background: var(--card-bg); color: white; border: 1px solid var(--border); }
        
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 4px; border-radius: 4px; }

        #msg-preview { font-family: monospace; font-size: 0.75rem; color: var(--success); padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px; white-space: pre-wrap; border: 1px dashed var(--border); }
        .tab { flex:1; text-align:center; padding:10px; cursor:pointer; font-weight:800; font-size:0.7rem; border-radius: 8px; color: var(--text-muted); }
        .tab.active { background: var(--primary); color: white; }
    </style>
</head>
<body data-theme="dark">

<div class="bg-glow" id="glow"></div>
<div class="bg-grid"></div>

<div class="container">
    <header class="glass-card">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="logo-resgate.png" class="logo-img" alt="Logo" onclick="location.reload()" onerror="this.src='https://via.placeholder.com/150x50?text=RESGATE+116'">
            <div>
                <h1 style="font-size: 1.1rem; color: var(--primary);">GRUPO RESGATE 116</h1>
                <p style="font-size: 0.65rem; color: var(--text-muted);">Dashboard Executivo v2.6</p>
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-icon admin-only" onclick="exportData()" title="Backup">📤</button>
            <button class="btn btn-icon admin-only" onclick="importData()" title="Restaurar">📥</button>
            <button class="btn btn-icon" onclick="toggleTheme()">🌓</button>
            <button class="btn btn-icon" onclick="fetchEntries()">🔄</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card glass-card previsao"><h3>Previsto Hoje</h3><div class="value" id="stat-hoje" style="color: var(--success)">R$ 0,00</div></div>
        <div class="stat-card glass-card previsao"><h3>Restante do Mês</h3><div class="value" id="stat-restante-mes">R$ 0,00</div></div>
        <div class="stat-card glass-card"><h3>Já Liquidados</h3><div class="value" id="stat-liquidados">R$ 0,00</div></div>
        <div class="stat-card glass-card"><h3>Total Programado</h3><div class="value" id="stat-total-mes">R$ 0,00</div></div>
    </div>

    <div class="dashboard-grid">
        <div class="left-column">
            <div class="card glass-card admin-only" style="padding: 20px; margin-bottom: 20px;">
                <h4 style="margin-bottom:15px; font-size:0.7rem;">NOVO LANÇAMENTO</h4>
                <form id="entry-form">
                    <input type="date" id="input-date" required>
                    <input type="text" id="input-seguradora" placeholder="SEGURADORA" required>
                    <input type="text" id="input-value" placeholder="VALOR R$ 0,00" required>
                    <input type="text" id="input-obs" placeholder="NOTA FISCAL / DESCRIÇÃO">
                    <button type="submit" class="btn btn-primary" id="btn-submit">AGENDAR ENTRADA</button>
                </form>
            </div>
            <div class="card glass-card" style="padding: 20px;">
                <h4 style="margin-bottom:15px; font-size:0.7rem">CONCENTRAÇÃO</h4>
                <div style="height: 220px;"><canvas id="pieChart"></canvas></div>
            </div>
        </div>

        <div class="center-column">
            <div class="glass-card" style="display: flex; gap: 5px; padding: 5px; margin-bottom: 15px;">
                <div class="tab active" onclick="switchTab('proximos')" id="tab-proximos">PRÓXIMOS CRÉDITOS</div>
                <div class="tab" onclick="switchTab('historico')" id="tab-historico">HISTÓRICO</div>
            </div>
            <div id="list-container"></div>
        </div>

        <div class="right-column">
            <div class="card glass-card" style="padding: 20px;">
                <h4 style="margin-bottom:15px; font-size:0.7rem">RESUMO WHATSAPP</h4>
                <div id="msg-preview"></div>
                <button class="btn btn-copy" onclick="copyToClipboard()">📋 COPIAR TEXTO</button>
                <button class="btn btn-whatsapp" onclick="sendWhatsApp()">🚀 ENVIAR PARA O GRUPO</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://glmyblygbvhpluwncbtm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsbXlibHlnYnZocGx1d25jYnRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDY2MTQsImV4cCI6MjA5MTEyMjYxNH0.PqdwEYVYXIvOh2pYqQwaq8eyf2ZWS6BalQzOpINrXts';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let entries = [];
    let currentTab = 'proximos';
    let editingId = null;
    let pieChart;

    document.addEventListener('mousemove', e => {
        const glow = document.getElementById('glow');
        glow.style.setProperty('--x', e.clientX + 'px');
        glow.style.setProperty('--y', e.clientY + 'px');
    });

    async function fetchEntries() {
        const { data } = await _supabase.from('entries').select('*').order('date', { ascending: true });
        entries = data || [];
        render();
    }

    function render() {
        const hoje = new Date().toISOString().split('T')[0];
        const agora = new Date();
        const mesAtual = agora.getMonth();
        const anoAtual = agora.getFullYear();

        let somaHoje = 0, somaRestanteMes = 0, somaLiquidados = 0, somaTotalMes = 0;
        let segTotals = {};

        entries.forEach(e => {
            const d = new Date(e.date + 'T12:00:00');
            if (d.getMonth() === mesAtual && d.getFullYear() === anoAtual) {
                somaTotalMes += e.value;
                if (e.date >= hoje) {
                    somaRestanteMes += e.value;
                    segTotals[e.seguradora] = (segTotals[e.seguradora] || 0) + e.value;
                } else { somaLiquidados += e.value; }
            }
            if (e.date === hoje) somaHoje += e.value;
        });

        document.getElementById('stat-hoje').innerText = formatCurrency(somaHoje);
        document.getElementById('stat-restante-mes').innerText = formatCurrency(somaRestanteMes);
        document.getElementById('stat-liquidados').innerText = formatCurrency(somaLiquidados);
        document.getElementById('stat-total-mes').innerText = formatCurrency(somaTotalMes);

        const filtered = entries.filter(e => currentTab === 'proximos' ? e.date >= hoje : e.date < hoje);
        const groups = filtered.reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});

        const listCont = document.getElementById('list-container');
        listCont.innerHTML = '';
        
        Object.keys(groups).sort((a,b) => currentTab === 'proximos' ? a.localeCompare(b) : b.localeCompare(a)).forEach(date => {
            const totalDia = groups[date].reduce((s, x) => s + x.value, 0);
            const div = document.createElement('div');
            div.className = 'day-group';
            div.innerHTML = `
                <div class="day-header" onclick="this.parentElement.classList.toggle('active')">
                    <span><b>${date.split('-').reverse().slice(0,2).join('/')}</b></span>
                    <span style="color:var(--success); font-weight:800">${formatCurrency(totalDia)}</span>
                </div>
                <div class="day-content">
                    ${groups[date].map(e => `
                        <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.75rem; padding:8px 0; border-bottom:1px solid var(--border)">
                            <span style="flex:1"><b>${e.seguradora}</b></span>
                            <span style="flex:1; text-align:center; color:var(--text-muted)">${e.description || 'S/ NF'}</span>
                            <span style="flex:1; text-align:right; display:flex; align-items:center; justify-content:flex-end; gap:10px;">
                                <b>${formatCurrency(e.value)}</b>
                                <div class="admin-only">
                                    <button class="action-btn" onclick="editEntry('${e.id}')">✏️</button>
                                    <button class="action-btn" onclick="deleteEntry('${e.id}')">🗑️</button>
                                </div>
                            </span>
                        </div>
                    `).join('')}
                </div>`;
            listCont.appendChild(div);
        });
        updateChart(segTotals);
        updateWhatsapp();
    }

    async function deleteEntry(id) {
        if(confirm("Excluir este lançamento?")) {
            await _supabase.from('entries').delete().eq('id', id);
            fetchEntries();
        }
    }

    function editEntry(id) {
        const item = entries.find(e => e.id == id);
        if(!item) return;
        editingId = id;
        document.getElementById('input-date').value = item.date;
        document.getElementById('input-seguradora').value = item.seguradora;
        document.getElementById('input-value').value = item.value.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        document.getElementById('input-obs').value = item.description || '';
        document.getElementById('btn-submit').innerText = "ATUALIZAR LANÇAMENTO";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateChart(data) {
        const ctx = document.getElementById('pieChart').getContext('2d');
        if (pieChart) pieChart.destroy();
        pieChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(data),
                datasets: [{ data: Object.values(data), backgroundColor: ['#e11d48', '#10b981', '#3b82f6', '#f59e0b', '#8b5cf6'] }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '75%' }
        });
    }

    function updateWhatsapp() {
        let msg = "📊 *PROGRAMAÇÕES RESGATE 116*\n\n";
        entries.filter(e => e.date >= new Date().toISOString().split('T')[0]).slice(0,7).forEach(e => {
            msg += `📅 ${e.date.split('-').reverse().slice(0,2).join('/')} - ${e.seguradora}: *${formatCurrency(e.value)}*\n`;
        });
        document.getElementById('msg-preview').innerText = msg;
    }

    function formatCurrency(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
    
    function switchTab(t) { 
        currentTab = t; 
        document.getElementById('tab-proximos').classList.toggle('active', t==='proximos');
        document.getElementById('tab-historico').classList.toggle('active', t==='historico');
        render(); 
    }

    function copyToClipboard() {
        const text = document.getElementById('msg-preview').innerText;
        navigator.clipboard.writeText(text).then(() => alert("Texto copiado!"));
    }

    function sendWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent(document.getElementById('msg-preview').innerText)}`, '_blank'); }

    // Backup
    async function exportData() {
        const { data } = await _supabase.from('entries').select('*');
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup_financeiro.json'; a.click();
    }

    async function importData() {
        const fileInput = document.createElement('input'); fileInput.type = 'file';
        fileInput.onchange = e => {
            const reader = new FileReader();
            reader.onload = async event => {
                const json = JSON.parse(event.target.result);
                await _supabase.from('entries').insert(json); fetchEntries();
            };
            reader.readAsText(e.target.files[0]);
        };
        fileInput.click();
    }

    if (new URLSearchParams(window.location.search).get('admin') === 'true') {
        if (prompt("Senha Admin:") === "Murrilho123*") document.body.classList.add('is-admin');
    }

    document.getElementById('input-value').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        e.target.value = (v/100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
    });

    document.getElementById('entry-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const val = parseFloat(document.getElementById('input-value').value.replace(/\D/g, '')) / 100;
        const payload = { 
            date: document.getElementById('input-date').value, 
            seguradora: document.getElementById('input-seguradora').value.toUpperCase(), 
            value: val,
            description: document.getElementById('input-obs').value.toUpperCase()
        };

        if(editingId) {
            await _supabase.from('entries').update(payload).eq('id', editingId);
            editingId = null;
            document.getElementById('btn-submit').innerText = "AGENDAR ENTRADA";
        } else {
            await _supabase.from('entries').insert([payload]);
        }
        
        document.getElementById('entry-form').reset();
        fetchEntries();
    });

    fetchEntries();
</script>
</body>
</html>
