<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - Grupo Resgate 116</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>💵</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #e11d48; --success: #10b981; --whatsapp: #25d366; 
            --bg: #0b0e14; --card-bg: rgba(15, 23, 42, 0.95); --text-main: #f8fafc;
            --border: rgba(51, 65, 85, 1); --highlight-yellow: #facc15;
        }

        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1550px; margin: 0 auto; }

        header { 
            display: flex; align-items: center; 
            margin-bottom: 30px; padding: 25px 40px; 
            background: var(--card-bg); border-radius: 25px; border: 1px solid var(--border);
        }

        .logo-box { display: flex; align-items: center; gap: 25px; }
        .logo-img { height: 110px; } /* LOGO GRANDE */
        
        .dev-info h1 { font-size: 1.8rem; font-weight: 900; color: var(--primary); margin: 0; }
        .dev-tag { background: var(--primary); color: white; padding: 5px 15px; border-radius: 6px; font-size: 0.8rem; font-weight: 900; display: inline-block; margin-top: 5px; }

        /* BOTÕES PARA A DIREITA */
        .header-actions { margin-left: auto; display: flex; gap: 15px; align-items: center; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 35px; }
        .stat-card { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--border); border-bottom: 4px solid var(--primary); }
        
        /* DESTAQUE AMARELO RESTAURADO */
        .destaque-amarelo { border: 2.5px solid var(--highlight-yellow) !important; }

        .stat-card h3 { font-size: 0.75rem; color: #94a3b8; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; }
        .stat-card .value { font-size: 1.9rem; font-weight: 900; }

        .dashboard-grid { display: grid; grid-template-columns: 380px 1fr 380px; gap: 25px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 22px; border: 1px solid var(--border); margin-bottom: 25px; }

        .btn { padding: 15px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; color: white; text-transform: uppercase; }
        .btn-primary { background: var(--primary); }
        .btn-outline { background: var(--border); }
        
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: #000; color: white; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; }

        .day-group { margin-bottom: 15px; border: 1px solid var(--border); border-radius: 15px; overflow: hidden; }
        .day-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(255,255,255,0.03); cursor: pointer; }
        .day-content { display: none; padding: 20px; border-top: 1px solid var(--border); }
        .day-group.active .day-content { display: block; }

        .entry-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .action-icons span { cursor: pointer; margin-left: 15px; font-size: 1.2rem; transition: 0.2s; }
        .action-icons span:hover { opacity: 0.7; }

        @media (max-width: 1100px) {
            header { flex-direction: column; padding: 20px; gap: 20px; }
            .header-actions { margin-left: 0; width: 100%; justify-content: center; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .dashboard-grid { display: flex; flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-box">
            <img src="logo-resgate.png" class="logo-img" alt="Logo" onerror="this.src='https://via.placeholder.com/150x110?text=RESGATE+116'">
            <div class="dev-info">
                <h1>RESGATE 116</h1>
                <div class="dev-tag">SISTEMA DEV: PATRICK ALMEIDA</div>
            </div>
        </div>

        <div class="header-actions">
            <button class="btn btn-outline" style="width: 60px;" onclick="toggleTheme()">🌓</button>
            <div id="admin-tools" style="display: none; display: flex; gap: 10px;">
                <button class="btn btn-outline" onclick="exportData()">EXPORTAR</button>
            </div>
            <button class="btn btn-primary" onclick="fetchEntries()">🔄 SINCRONIZAR</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card destaque-amarelo"><h3>Previsto Hoje</h3><div class="value" id="stat-hoje" style="color: var(--success)">R$ 0,00</div></div>
        <div class="stat-card destaque-amarelo"><h3>Restante do Mês</h3><div class="value" id="stat-restante" style="color: var(--success)">R$ 0,00</div></div>
        <div class="stat-card"><h3>Já Liquidados</h3><div class="value" id="stat-liquidados">R$ 0,00</div></div>
        <div class="stat-card"><h3>Total Bruto</h3><div class="value" id="stat-total" style="color: var(--primary)">R$ 0,00</div></div>
    </div>

    <div class="dashboard-grid">
        <div class="left-column">
            <div class="card" id="form-card" style="display: none;">
                <div style="font-weight: 900; margin-bottom: 20px; text-transform: uppercase; color: var(--primary);">➕ Novo Lançamento</div>
                <form id="entry-form">
                    <input type="hidden" id="edit-id">
                    <input type="date" id="input-date" required>
                    <input type="text" id="input-seguradora" placeholder="SEGURADORA" required>
                    <input type="text" id="input-value" placeholder="VALOR R$ 0,00" required>
                    <input type="text" id="input-desc" placeholder="OBSERVAÇÃO / NF">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">SALVAR LANÇAMENTO</button>
                </form>
            </div>
            <div class="card"><canvas id="pieChart" style="max-height: 250px;"></canvas></div>
        </div>

        <div class="center-column">
            <div id="list-container"></div>
        </div>

        <div class="right-column">
            <div class="card">
                <div style="font-weight: 900; margin-bottom: 20px; text-transform: uppercase;">📱 Resumo WhatsApp</div>
                <div id="msg-preview" style="background: #000; color: #10b981; padding: 20px; border-radius: 12px; font-family: monospace; white-space: pre-wrap; font-size: 0.9rem; border: 1px solid var(--border); margin-bottom: 15px;">Carregando...</div>
                <button class="btn btn-outline" style="width: 100%; margin-bottom: 10px;" onclick="copyText()">📋 COPIAR TEXTO</button>
                <button class="btn" style="width: 100%; background: var(--whatsapp);" onclick="sendWhatsApp()">🚀 ENVIAR PARA O WHATSAPP</button>
            </div>
        </div>
    </div>
</div>

<script>
    const MASTER_PASS = "Murrilho123*";
    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('admin') === 'true';

    if (isAdmin) {
        document.getElementById('form-card').style.display = 'block';
        document.getElementById('admin-tools').style.display = 'flex';
    }

    function checkAuth() { 
        const pass = prompt("Digite a senha administrativa:"); 
        if(pass === MASTER_PASS) return true; 
        alert("Senha Incorreta!"); return false; 
    }

    const SUPABASE_URL = 'https://glmyblygbvhpluwncbtm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsbXlibHlnYnZocGx1d25jYnRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDY2MTQsImV4cCI6MjA5MTEyMjYxNH0.PqdwEYVYXIvOh2pYqQwaq8eyf2ZWS6BalQzOpINrXts';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let entries = [];
    let openDays = {};

    async function fetchEntries() {
        const { data } = await _supabase.from('entries').select('*').order('date', { ascending: true });
        entries = data || [];
        render();
    }

    function render() {
        const hoje = new Date().toISOString().split('T')[0];
        let sHoje = 0, sRestante = 0, sLiq = 0, sTotal = 0, segTotals = {};
        
        entries.forEach(e => {
            sTotal += e.value;
            if (e.date === hoje) sHoje += e.value;
            if (e.date >= hoje) sRestante += e.value; else sLiq += e.value;
            segTotals[e.seguradora] = (segTotals[e.seguradora] || 0) + e.value;
        });

        document.getElementById('stat-hoje').innerText = formatCurrency(sHoje);
        document.getElementById('stat-restante').innerText = formatCurrency(sRestante);
        document.getElementById('stat-liquidados').innerText = formatCurrency(sLiq);
        document.getElementById('stat-total').innerText = formatCurrency(sTotal);

        const groups = entries.filter(e => e.date >= hoje).reduce((acc, e) => { acc[e.date] = acc[e.date] || []; acc[e.date].push(e); return acc; }, {});
        const cont = document.getElementById('list-container');
        cont.innerHTML = '';
        
        Object.keys(groups).forEach(date => {
            const totalDia = groups[date].reduce((s, x) => s + x.value, 0);
            const div = document.createElement('div');
            div.className = `day-group ${openDays[date] ? 'active' : ''}`;
            div.innerHTML = `
                <div class="day-header" onclick="toggleDay('${date}')">
                    <span>📅 <b>${date.split('-').reverse().slice(0,2).join('/')}</b></span>
                    <span style="color:var(--success); font-weight:900;">${formatCurrency(totalDia)}</span>
                </div>
                <div class="day-content">
                    ${groups[date].map(e => `
                        <div class="entry-row">
                            <span><b>${e.seguradora}</b> <small style="display:block; opacity:0.6">${e.desc || ''}</small></span>
                            <div class="action-icons">
                                <b>${formatCurrency(e.value)}</b>
                                ${isAdmin ? `<span onclick="editEntry(${e.id})">✏️</span><span onclick="deleteEntry(${e.id})">🗑️</span>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            cont.appendChild(div);
        });
        updateWhatsapp(hoje);
        renderChart(segTotals);
    }

    function toggleDay(date) { openDays[date] = !openDays[date]; render(); }
    function formatCurrency(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    document.getElementById('entry-form').onsubmit = async (e) => {
        e.preventDefault();
        if(!checkAuth()) return;
        const id = document.getElementById('edit-id').value;
        const val = parseFloat(document.getElementById('input-value').value.replace(/\./g, '').replace(',', '.'));
        const entry = {
            date: document.getElementById('input-date').value,
            seguradora: document.getElementById('input-seguradora').value.toUpperCase(),
            value: val, desc: document.getElementById('input-desc').value.toUpperCase()
        };
        if(id) await _supabase.from('entries').update(entry).eq('id', id);
        else await _supabase.from('entries').insert([entry]);
        document.getElementById('entry-form').reset();
        document.getElementById('edit-id').value = '';
        fetchEntries();
    };

    function editEntry(id) {
        const e = entries.find(x => x.id == id);
        document.getElementById('edit-id').value = e.id;
        document.getElementById('input-date').value = e.date;
        document.getElementById('input-seguradora').value = e.seguradora;
        document.getElementById('input-value').value = e.value.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        document.getElementById('input-desc').value = e.desc || '';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function deleteEntry(id) { 
        if(confirm('Deseja excluir?') && checkAuth()) { 
            await _supabase.from('entries').delete().eq('id', id); fetchEntries(); 
        } 
    }

    document.getElementById('input-value').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        v = (v / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        e.target.value = v;
    });

    fetchEntries();
</script>
</body>
</html>
